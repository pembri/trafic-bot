<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Suno Cover - ApiPass</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    .drop-zone { transition: all 0.3s; }
    .drop-zone.dragover { background-color: #dbeafe; border-color: #2563eb; }
  </style>
</head>
<body class="bg-gray-50">

<div class="max-w-5xl mx-auto bg-white shadow-xl min-h-screen">

  <!-- Header -->
  <div class="border-b px-6 py-4 flex items-center justify-between bg-white sticky top-0 z-10">
    <div class="flex items-center gap-3">
      <div class="w-9 h-9 bg-black rounded-2xl flex items-center justify-center">
        <i class="fa-solid fa-gear text-white text-2xl"></i>
      </div>
      <span class="font-bold text-3xl tracking-tighter text-black">Suno Cover</span>
    </div>
    <div class="bg-blue-600 text-white px-5 py-2 rounded-2xl font-semibold flex items-center gap-2 text-sm">
      <span id="balance">52.5</span>
      <i class="fa-solid fa-wallet"></i>
    </div>
  </div>

  <div class="p-6">

    <!-- API Token -->
    <div class="mb-6">
      <label class="block text-sm font-medium text-gray-700 mb-1">API Token <span class="text-red-500">*</span></label>
      <div class="flex gap-3">
        <input id="apiToken" type="text" 
               class="flex-1 px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:border-blue-500 text-sm"
               placeholder="apk_xxxxxxxxxxxxxxxxxxxxxxxxxxxx">
        <button onclick="checkApiToken()" 
                class="px-5 py-3 bg-gray-800 hover:bg-black text-white rounded-2xl font-medium text-sm whitespace-nowrap">
          Check
        </button>
      </div>
      <p id="tokenStatus" class="text-xs mt-1 min-h-[20px]"></p>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">

      <!-- INPUT -->
      <div>
        <h2 class="text-xl font-semibold mb-5">Input</h2>

        <!-- Model Version -->
        <div class="mb-5">
          <label class="block text-sm font-medium mb-1">Model Version</label>
          <select id="modelVersion" class="w-full px-4 py-3 border border-gray-300 rounded-2xl text-sm">
            <option value="V5">V5 (Latest & Default)</option>
            <option value="V4_5PLUS">V4.5 Plus</option>
            <option value="V4_5ALL">V4.5 All</option>
            <option value="V4_5">V4.5</option>
            <option value="V4">V4</option>
          </select>
        </div>

        <!-- Source Audio -->
        <div class="mb-6">
          <label class="block text-sm font-medium mb-1">Source Audio <span class="text-red-500">*</span></label>
          <div id="dropZone" class="drop-zone border-2 border-dashed border-gray-300 rounded-3xl p-10 text-center cursor-pointer">
            <i class="fa-solid fa-cloud-arrow-up text-5xl text-gray-400 mb-4"></i>
            <p class="text-gray-700 font-medium">Klik atau drag & drop file audio</p>
            <p class="text-xs text-gray-500 mt-2">MP3, WAV, OGG, M4A, FLAC (max 50MB)</p>
            <input type="file" id="audioFile" accept="audio/*" class="hidden">
          </div>
          <div id="fileInfo" class="mt-3 text-sm text-green-600 hidden flex items-center gap-2">
            <i class="fa-solid fa-check-circle"></i>
            <span id="uploadedFileName" class="break-all"></span>
          </div>
        </div>

        <!-- Toggles -->
        <div class="grid grid-cols-2 gap-6 mb-6">
          <div class="flex items-center justify-between">
            <div>
              <div class="font-medium text-sm">Custom Mode</div>
              <div class="text-xs text-gray-500">Style & title manual</div>
            </div>
            <label class="relative inline-flex items-center cursor-pointer">
              <input type="checkbox" id="customMode" class="sr-only peer" onchange="toggleCustom()">
              <div class="w-11 h-6 bg-gray-300 rounded-full peer peer-checked:bg-blue-600"></div>
              <div class="absolute left-0.5 top-0.5 bg-white w-5 h-5 rounded-full transition peer-checked:translate-x-5"></div>
            </label>
          </div>

          <div class="flex items-center justify-between">
            <div>
              <div class="font-medium text-sm">Instrumental Only</div>
              <div class="text-xs text-gray-500">Tanpa vokal</div>
            </div>
            <label class="relative inline-flex items-center cursor-pointer">
              <input type="checkbox" id="instrumental" class="sr-only peer">
              <div class="w-11 h-6 bg-gray-300 rounded-full peer peer-checked:bg-blue-600"></div>
              <div class="absolute left-0.5 top-0.5 bg-white w-5 h-5 rounded-full transition peer-checked:translate-x-5"></div>
            </label>
          </div>
        </div>

        <!-- Cover Prompt -->
        <div class="mb-5">
          <label class="block text-sm font-medium mb-1">Cover Prompt</label>
          <textarea id="coverPrompt" rows="3" class="w-full px-4 py-3 border border-gray-300 rounded-2xl text-sm"
                    placeholder="Transform this song into smooth jazz with piano and saxophone..."></textarea>
        </div>

        <!-- Custom Fields -->
        <div id="customFields" class="hidden space-y-5">
          <div>
            <label class="block text-sm font-medium mb-1">Target Style</label>
            <input id="targetStyle" type="text" class="w-full px-4 py-3 border border-gray-300 rounded-2xl text-sm" value="Jazz">
          </div>
          <div>
            <label class="block text-sm font-medium mb-1">Cover Title</label>
            <input id="coverTitle" type="text" class="w-full px-4 py-3 border border-gray-300 rounded-2xl text-sm" value="My Song (Jazz Cover)">
          </div>
        </div>

        <!-- Start At & Vocal Gender -->
        <div class="grid grid-cols-2 gap-5 mb-6">
          <div>
            <label class="block text-sm font-medium mb-1">Start At (detik)</label>
            <input id="startAt" type="number" value="0" class="w-full px-4 py-3 border border-gray-300 rounded-2xl text-sm">
          </div>
          <div>
            <label class="block text-sm font-medium mb-1">Vocal Gender</label>
            <div class="flex gap-3">
              <button onclick="selectGender(this, 'm')" id="maleBtn" 
                      class="flex-1 py-3 border-2 border-blue-600 bg-blue-50 text-blue-600 rounded-2xl text-sm font-medium">Male</button>
              <button onclick="selectGender(this, 'f')" id="femaleBtn" 
                      class="flex-1 py-3 border border-gray-300 rounded-2xl text-sm font-medium">Female</button>
            </div>
          </div>
        </div>

        <!-- Sliders -->
        <div class="space-y-6">
          <div>
            <div class="flex justify-between text-sm mb-1"><span>Style Weight</span><span id="styleVal">0.62</span></div>
            <input type="range" id="styleWeight" min="0" max="1" step="0.01" value="0.62" 
                   class="w-full accent-blue-600" oninput="document.getElementById('styleVal').textContent=this.value">
          </div>
          <div>
            <div class="flex justify-between text-sm mb-1"><span>Weirdness</span><span id="weirdVal">0.3</span></div>
            <input type="range" id="weirdness" min="0" max="1" step="0.01" value="0.3" 
                   class="w-full accent-blue-600" oninput="document.getElementById('weirdVal').textContent=this.value">
          </div>
          <div>
            <div class="flex justify-between text-sm mb-1"><span>Source Audio Weight</span><span id="audioVal">0.5</span></div>
            <input type="range" id="audioWeight" min="0" max="1" step="0.01" value="0.5" 
                   class="w-full accent-blue-600" oninput="document.getElementById('audioVal').textContent=this.value">
          </div>
        </div>

        <button onclick="runCoverGeneration()" 
                class="mt-10 w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-4 rounded-3xl text-lg flex items-center justify-center gap-3">
          <i class="fa-solid fa-play"></i>
          Run Cover (2.5 credit)
        </button>
      </div>

      <!-- OUTPUT -->
      <div>
        <h2 class="text-xl font-semibold mb-4">Output</h2>
        <div id="outputArea" class="border border-gray-200 rounded-3xl p-6 bg-gray-50 min-h-[420px]">

          <div id="status" class="hidden mb-4 p-4 bg-blue-50 border border-blue-200 rounded-2xl">
            <div class="flex items-center gap-3">
              <i id="statusIcon" class="fa-solid fa-spinner fa-spin text-blue-600"></i>
              <div class="flex-1">
                <div id="statusText" class="font-medium text-sm">Mengirim task...</div>
                <div id="taskIdDisplay" class="text-xs text-gray-500"></div>
              </div>
            </div>
          </div>

          <div id="resultPlayer" class="hidden">
            <audio id="audioResult" controls class="w-full"></audio>
            <div class="mt-4 flex flex-wrap gap-4 justify-center">
              <a id="downloadLink" href="#" target="_blank" 
                 class="inline-flex items-center gap-2 text-blue-600 hover:text-blue-700 font-medium">
                <i class="fa-solid fa-download"></i> Download Audio
              </a>
            </div>
          </div>

          <div id="placeholder" class="text-center py-20 text-gray-400">
            <i class="fa-solid fa-waveform-lines text-6xl mb-6 opacity-50"></i>
            <p class="font-medium">Hasil cover akan muncul di sini</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// Variabel global
let audioUrl = "";
let currentTaskId = "";

// Upload menggunakan file.io (lebih stabil di GitHub Pages)
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('audioFile');

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('dragover'); handleFile(e.dataTransfer.files[0]); });

fileInput.addEventListener('change', () => {
  if (fileInput.files.length > 0) handleFile(fileInput.files[0]);
});

async function handleFile(file) {
  if (!file) return;
  if (file.size > 50 * 1024 * 1024) return alert("File terlalu besar! Maksimal 50MB.");

  const formData = new FormData();
  formData.append('file', file);

  try {
    dropZone.innerHTML = `<p class="text-blue-600">Uploading ke file.io...</p>`;
    
    const res = await fetch('https://file.io', {
      method: 'POST',
      body: formData
    });

    const data = await res.json();

    if (data.success && data.link) {
      audioUrl = data.link;
      document.getElementById('fileInfo').classList.remove('hidden');
      document.getElementById('uploadedFileName').innerHTML = `\( {file.name} <span class="text-xs text-gray-500">( \){ (file.size/1024/1024).toFixed(1) } MB)</span>`;
      dropZone.innerHTML = `<p class="text-green-600 text-sm">✅ Upload berhasil!<br><small class="break-all">${audioUrl}</small></p>`;
    } else {
      throw new Error(data.message || "Upload gagal");
    }
  } catch (err) {
    alert("Upload error: " + err.message + "\n\nCoba lagi atau gunakan file yang lebih kecil.");
    resetDropZone();
  }
}

function resetDropZone() {
  dropZone.innerHTML = `
    <i class="fa-solid fa-cloud-arrow-up text-5xl text-gray-400 mb-4"></i>
    <p class="text-gray-700 font-medium">Klik atau drag & drop file audio</p>
    <p class="text-xs text-gray-500 mt-2">MP3, WAV, OGG, M4A, FLAC (max 50MB)</p>
  `;
}

// Check Token
async function checkApiToken() {
  const token = document.getElementById('apiToken').value.trim();
  const statusEl = document.getElementById('tokenStatus');
  
  if (!token) {
    statusEl.innerHTML = `<span class="text-red-500">Token tidak boleh kosong</span>`;
    return;
  }

  statusEl.innerHTML = `<span class="text-blue-600">Memeriksa...</span>`;

  try {
    const res = await fetch('https://api.apipass.dev/api/v1/jobs/createTask', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${token}`
      },
      body: JSON.stringify({ model: "suno/cover", input: { audioUrl: "https://example.com/test.mp3" } })
    });

    const data = await res.json();
    if (data.code === 200 || data.code === 402) {
      statusEl.innerHTML = `<span class="text-green-600">✅ Token valid</span>`;
    } else {
      statusEl.innerHTML = `<span class="text-red-500">❌ Token tidak valid</span>`;
    }
  } catch (err) {
    statusEl.innerHTML = `<span class="text-red-500">❌ Gagal terhubung</span>`;
  }
}

// Toggle Custom Mode
function toggleCustom() {
  const isCustom = document.getElementById('customMode').checked;
  document.getElementById('customFields').classList.toggle('hidden', !isCustom);
}

// Vocal Gender
let vocalGender = 'm';
function selectGender(btn, gender) {
  vocalGender = gender;
  document.getElementById('maleBtn').classList.toggle('border-blue-600', gender === 'm');
  document.getElementById('maleBtn').classList.toggle('bg-blue-50', gender === 'm');
  document.getElementById('femaleBtn').classList.toggle('border-blue-600', gender === 'f');
  document.getElementById('femaleBtn').classList.toggle('bg-blue-50', gender === 'f');
}

// Run Cover
async function runCoverGeneration() {
  const token = document.getElementById('apiToken').value.trim();
  if (!token) return alert("Masukkan API Token terlebih dahulu!");
  if (!audioUrl) return alert("Upload file audio dulu!");

  const payload = {
    model: "suno/cover",
    input: {
      model_version: document.getElementById('modelVersion').value,
      audioUrl: audioUrl,
      customMode: document.getElementById('customMode').checked,
      instrumental: document.getElementById('instrumental').checked,
      prompt: document.getElementById('coverPrompt').value.trim(),
      style: document.getElementById('targetStyle').value.trim(),
      title: document.getElementById('coverTitle').value.trim(),
      continueAt: parseInt(document.getElementById('startAt').value) || 0,
      vocalGender: vocalGender,
      styleWeight: parseFloat(document.getElementById('styleWeight').value),
      audioWeight: parseFloat(document.getElementById('audioWeight').value)
    }
  };

  document.getElementById('status').classList.remove('hidden');
  document.getElementById('placeholder').classList.add('hidden');
  document.getElementById('statusText').textContent = "Mengirim task...";

  try {
    const response = await fetch('https://api.apipass.dev/api/v1/jobs/createTask', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${token}`
      },
      body: JSON.stringify(payload)
    });

    const result = await response.json();

    if (result.code === 200 && result.data?.taskId) {
      currentTaskId = result.data.taskId;
      document.getElementById('taskIdDisplay').textContent = `Task ID: ${currentTaskId}`;
      document.getElementById('statusText').innerHTML = `✅ Task dibuat!<br><small class="text-xs">Proses sedang berjalan (60-120 detik)</small>`;
      alert(`Task berhasil dibuat!\n\nTask ID: ${currentTaskId}`);
    } else {
      alert("Error: " + (result.message || JSON.stringify(result)));
    }
  } catch (err) {
    alert("Gagal mengirim request: " + err.message);
  }
}

// Inisialisasi
document.getElementById('maleBtn').classList.add('border-blue-600', 'bg-blue-50');
</script>
</body>
</html>
