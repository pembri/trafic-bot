<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CoverAI • Suno Cover</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        .title-font { font-family: 'Space Grotesk', sans-serif; }
        .mobile-frame {
            max-width: 420px;
            margin: 0 auto;
            box-shadow: 0 0 0 14px #111827;
            border-radius: 48px;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #0f172a;
        }
        input[type="range"] { accent-color: #8b5cf6; }
    </style>
</head>
<body class="bg-zinc-950 flex items-center justify-center min-h-screen p-4">

<div class="mobile-frame flex flex-col">

    <!-- HEADER -->
    <div class="bg-[#1e2937] px-5 py-4 flex items-center justify-between border-b border-white/10">
        <div class="flex items-center gap-3">
            <div class="w-9 h-9 bg-violet-600 rounded-2xl flex items-center justify-center">
                <i class="fa-solid fa-waveform text-2xl text-white"></i>
            </div>
            <h1 class="title-font text-2xl tracking-tight">CoverAI</h1>
        </div>
        <div onclick="toggleApiModal()" class="flex items-center gap-2 bg-white/10 hover:bg-white/20 px-4 py-2 rounded-3xl cursor-pointer">
            <i class="fa-solid fa-key"></i>
            <span id="key-status" class="font-medium text-sm">API Key</span>
        </div>
    </div>

    <!-- TABS -->
    <div class="flex border-b border-white/10">
        <button onclick="switchTab(0)" id="tab-0" class="flex-1 py-4 text-violet-400 border-b-2 border-violet-500 font-medium">Generate</button>
        <button onclick="switchTab(1)" id="tab-1" class="flex-1 py-4 text-gray-400 font-medium">Riwayat</button>
    </div>

    <!-- GENERATE TAB -->
    <div id="tab-content-0" class="flex-1 overflow-auto p-5 space-y-6">

        <!-- Model Version -->
        <div>
            <label class="text-xs uppercase tracking-widest text-gray-400 mb-1 block">Model Version</label>
            <select id="model_version" class="w-full bg-white/10 border border-white/20 rounded-3xl px-5 py-3">
                <option value="V5" selected>V5 (Terbaru)</option>
                <option value="V4_5PLUS">V4.5 Plus</option>
                <option value="V4_5ALL">V4.5 All</option>
                <option value="V4_5">V4.5</option>
                <option value="V4">V4</option>
            </select>
        </div>

        <!-- Public Audio URL -->
        <div>
            <label class="text-xs uppercase tracking-widest text-gray-400 mb-1 block">Public Audio URL <span class="text-red-400">*</span></label>
            <input id="audioUrl" type="url" placeholder="https://contoh.com/lagu-anda.mp3" 
                   class="w-full bg-white/10 border border-white/20 rounded-3xl px-5 py-3 text-white">
        </div>

        <!-- Toggles -->
        <div class="grid grid-cols-2 gap-4">
            <div class="bg-white/5 rounded-3xl p-4 flex items-center justify-between">
                <div>Custom Mode</div>
                <input type="checkbox" id="customMode" onchange="toggleCustomMode()" class="toggle">
            </div>
            <div class="bg-white/5 rounded-3xl p-4 flex items-center justify-between">
                <div>Instrumental Only</div>
                <input type="checkbox" id="instrumental" class="toggle">
            </div>
        </div>

        <!-- Prompt -->
        <div id="prompt-group">
            <label class="text-xs uppercase tracking-widest text-gray-400 mb-1 block">Cover Prompt</label>
            <textarea id="prompt" rows="3" class="w-full bg-white/10 border border-white/20 rounded-3xl px-5 py-3" 
                      placeholder="Transform into smooth jazz with piano and saxophone..."></textarea>
        </div>

        <!-- Style & Title -->
        <div id="custom-group" class="hidden grid grid-cols-2 gap-4">
            <div>
                <label class="text-xs uppercase tracking-widest text-gray-400 mb-1 block">Target Style</label>
                <input id="style" type="text" value="Jazz, Smooth, Lounge" class="w-full bg-white/10 border border-white/20 rounded-3xl px-5 py-3">
            </div>
            <div>
                <label class="text-xs uppercase tracking-widest text-gray-400 mb-1 block">Cover Title</label>
                <input id="title" type="text" value="Lagu Saya (Jazz Cover)" class="w-full bg-white/10 border border-white/20 rounded-3xl px-5 py-3">
            </div>
        </div>

        <!-- Start At + Vocal Gender -->
        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="text-xs uppercase tracking-widest text-gray-400 mb-1 block">Start At (detik)</label>
                <input id="continueAt" type="number" value="0" class="w-full bg-white/10 border border-white/20 rounded-3xl px-5 py-3">
            </div>
            <div>
                <label class="text-xs uppercase tracking-widest text-gray-400 mb-1 block">Vocal Gender</label>
                <div class="flex bg-white/10 rounded-3xl p-1">
                    <button onclick="setGender(this)" data-value="f" class="flex-1 py-2 rounded-3xl bg-violet-600 text-white">♀ Female</button>
                    <button onclick="setGender(this)" data-value="m" class="flex-1 py-2 rounded-3xl">♂ Male</button>
                </div>
            </div>
        </div>

        <div>
            <label class="text-xs uppercase tracking-widest text-gray-400 mb-1 block">Negative Tags</label>
            <input id="negativeTags" type="text" placeholder="aggressive, auto-tune, heavy distortion..." 
                   class="w-full bg-white/10 border border-white/20 rounded-3xl px-5 py-3">
        </div>

        <!-- Sliders -->
        <div class="space-y-5">
            <div>
                <div class="flex justify-between text-xs mb-1"><span>Style Weight</span><span id="styleWeightVal">0.5</span></div>
                <input type="range" id="styleWeight" min="0" max="1" step="0.05" value="0.5" oninput="document.getElementById('styleWeightVal').textContent=this.value" class="w-full">
            </div>
            <div>
                <div class="flex justify-between text-xs mb-1"><span>Weirdness</span><span id="weirdnessVal">0.3</span></div>
                <input type="range" id="weirdness" min="0" max="1" step="0.05" value="0.3" oninput="document.getElementById('weirdnessVal').textContent=this.value" class="w-full">
            </div>
            <div>
                <div class="flex justify-between text-xs mb-1"><span>Source Audio Weight</span><span id="audioWeightVal">0.5</span></div>
                <input type="range" id="audioWeight" min="0" max="1" step="0.05" value="0.5" oninput="document.getElementById('audioWeightVal').textContent=this.value" class="w-full">
            </div>
        </div>

        <button onclick="startGeneration()" 
                class="w-full bg-gradient-to-r from-violet-600 to-purple-600 py-4 rounded-3xl font-semibold text-lg flex items-center justify-center gap-2">
            <i class="fa-solid fa-wand-magic-sparkles"></i>
            Run (2.5 per run)
        </button>
    </div>

    <!-- RIWAYAT TAB -->
    <div id="tab-content-1" class="hidden flex-1 p-5 text-gray-400">
        Riwayat akan muncul setelah generate berhasil.
    </div>
</div>

<!-- API KEY MODAL -->
<div id="api-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
    <div class="bg-[#1e2937] w-full max-w-[400px] mx-4 rounded-3xl p-6">
        <h3 class="text-xl font-semibold mb-4">Masukkan API Key</h3>
        <input id="api-key-input" type="text" placeholder="sk-..." class="w-full bg-white/10 border border-white/20 rounded-3xl px-5 py-4 mb-4">
        <div class="flex gap-3">
            <button onclick="toggleApiModal()" class="flex-1 py-3 border border-white/30 rounded-3xl">Batal</button>
            <button onclick="saveApiKey()" class="flex-1 py-3 bg-violet-600 rounded-3xl">Simpan</button>
        </div>
    </div>
</div>

<script>
let API_KEY = localStorage.getItem('coverai_apikey') || '';

function updateKeyUI() {
    document.getElementById('key-status').innerHTML = API_KEY ? '✅ Terhubung' : '🔑 API Key';
}

function toggleApiModal() {
    document.getElementById('api-modal').classList.toggle('hidden');
}

function saveApiKey() {
    const key = document.getElementById('api-key-input').value.trim();
    if (!key) return alert('API Key tidak boleh kosong');
    API_KEY = key;
    localStorage.setItem('coverai_apikey', key);
    updateKeyUI();
    toggleApiModal();
}

function toggleCustomMode() {
    const isCustom = document.getElementById('customMode').checked;
    document.getElementById('custom-group').classList.toggle('hidden', !isCustom);
    document.getElementById('prompt-group').classList.toggle('hidden', isCustom);
}

function setGender(btn) {
    document.querySelectorAll('#tab-content-0 button[data-value]').forEach(b => b.classList.remove('bg-violet-600', 'text-white'));
    btn.classList.add('bg-violet-600', 'text-white');
}

function switchTab(n) {
    document.getElementById('tab-0').classList.toggle('border-b-2', n===0);
    document.getElementById('tab-0').classList.toggle('text-violet-400', n===0);
    document.getElementById('tab-1').classList.toggle('border-b-2', n===1);
    document.getElementById('tab-1').classList.toggle('text-violet-400', n===1);
    document.getElementById('tab-content-0').classList.toggle('hidden', n!==0);
    document.getElementById('tab-content-1').classList.toggle('hidden', n!==1);
}

async function startGeneration() {
    if (!API_KEY) {
        alert("Masukkan API Key terlebih dahulu!");
        toggleApiModal();
        return;
    }

    const audioUrl = document.getElementById('audioUrl').value.trim();
    if (!audioUrl) return alert("Public Audio URL wajib diisi!");

    const payload = {
        model: "suno/cover",
        input: {
            model_version: document.getElementById('model_version').value,
            audioUrl: audioUrl,
            customMode: document.getElementById('customMode').checked,
            instrumental: document.getElementById('instrumental').checked,
            prompt: document.getElementById('prompt').value.trim(),
            style: document.getElementById('style').value.trim(),
            title: document.getElementById('title').value.trim(),
            continueAt: parseInt(document.getElementById('continueAt').value) || 0,
            vocalGender: document.querySelector('#tab-content-0 button.bg-violet-600') ? 
                        document.querySelector('#tab-content-0 button.bg-violet-600').dataset.value : 'f',
            negativeTags: document.getElementById('negativeTags').value.trim(),
            styleWeight: parseFloat(document.getElementById('styleWeight').value),
            weirdness: parseFloat(document.getElementById('weirdness').value),
            audioWeight: parseFloat(document.getElementById('audioWeight').value)
        }
    };

    try {
        const res = await fetch('https://api.apipass.dev/api/v1/jobs/createTask', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${API_KEY}`
            },
            body: JSON.stringify(payload)
        });

        const data = await res.json();
        if (data.code === 200) {
            alert(`✅ Berhasil!\nTask ID: ${data.data.taskId}\n\nSedang diproses... (60-120 detik)`);
        } else {
            alert(`❌ Gagal: ${data.message || 'Cek saldo koin atau API Key'}`);
        }
    } catch (e) {
        alert('❌ Koneksi error. Pastikan API Key benar.');
        console.error(e);
    }
}

window.onload = () => {
    updateKeyUI();
    toggleCustomMode(); // default false
    console.log('%c✅ Versi lengkap CoverAI sudah siap', 'color:#a855f7;font-size:14px');
};
</script>
</body>
</html>
