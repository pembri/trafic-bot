<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAI Roots Cover • Suno V5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Inter', system_ui, sans-serif; }
        .neon { text-shadow: 0 0 12px rgb(16 185 129); }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">

<div class="max-w-2xl mx-auto px-4 py-6">

    <!-- HEADER -->
    <div class="flex justify-between items-center mb-8">
        <div class="flex items-center gap-3">
            <div class="w-11 h-11 bg-emerald-500 rounded-3xl flex items-center justify-center text-3xl rotate-12">🎵</div>
            <div>
                <h1 class="text-3xl font-bold tracking-tighter neon">SAI ROOTS COVER</h1>
                <p class="text-emerald-400 -mt-1">Suno V5 • Real API</p>
            </div>
        </div>
        <div onclick="toggleApiModal()" class="bg-zinc-900 hover:bg-zinc-800 px-5 py-3 rounded-3xl flex items-center gap-2 cursor-pointer">
            <i class="fa-solid fa-key text-emerald-400"></i>
            <span id="key-display" class="text-sm">API Key</span>
        </div>
    </div>

    <div class="bg-zinc-900 rounded-3xl p-6 border border-zinc-800">

        <form id="cover-form" onsubmit="createCoverTask(event)" class="space-y-8">

            <!-- Model Version -->
            <div>
                <label class="text-zinc-400 text-sm block mb-2">Model Version</label>
                <select id="model_version" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4">
                    <option value="V5">V5 (Latest - Rekomendasi)</option>
                    <option value="V4_5PLUS">V4.5 Plus</option>
                    <option value="V4_5">V4.5</option>
                </select>
            </div>

            <!-- Source Audio -->
            <div>
                <label class="text-zinc-400 text-sm block mb-2">Source Audio <span class="text-red-400">*</span></label>
                <div class="flex border border-zinc-700 rounded-3xl overflow-hidden text-sm">
                    <button type="button" onclick="switchTab(0)" id="tab0" class="flex-1 py-4 bg-emerald-500 text-white font-medium">Dari URL</button>
                    <button type="button" onclick="switchTab(1)" id="tab1" class="flex-1 py-4">Upload File</button>
                </div>

                <!-- URL -->
                <div id="url-panel" class="mt-4">
                    <input id="audioUrl" type="url" placeholder="https://example.com/lagu-asli.mp3" 
                           class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 focus:border-emerald-500">
                </div>

                <!-- Upload -->
                <div id="upload-panel" class="mt-4 hidden">
                    <div onclick="document.getElementById('fileInput').click()" 
                         class="border-2 border-dashed border-zinc-600 hover:border-emerald-400 rounded-3xl py-10 text-center cursor-pointer">
                        <i class="fa-solid fa-cloud-upload text-5xl text-emerald-400 mb-3"></i>
                        <p class="font-medium">Klik untuk upload audio</p>
                        <p class="text-xs text-zinc-400">MP3, WAV, OGG, M4A, FLAC • Max 50MB</p>
                    </div>
                    <input type="file" id="fileInput" accept="audio/*" class="hidden" onchange="handleFileUpload(event)">
                    <p id="file-name" class="text-xs text-emerald-400 mt-3 hidden"></p>
                </div>
            </div>

            <!-- Toggles -->
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-zinc-800 rounded-3xl p-4 flex justify-between items-center">
                    <div>Custom Mode</div>
                    <input type="checkbox" id="customMode" class="w-6 h-6 accent-emerald-500">
                </div>
                <div class="bg-zinc-800 rounded-3xl p-4 flex justify-between items-center">
                    <div>Instrumental Only</div>
                    <input type="checkbox" id="instrumental" class="w-6 h-6 accent-emerald-500">
                </div>
            </div>

            <!-- Prompt -->
            <div>
                <label class="text-zinc-400 text-sm block mb-2">Cover Prompt</label>
                <textarea id="prompt" rows="3" placeholder="Transform into smooth jazz with piano and saxophone" 
                          class="w-full bg-zinc-800 border border-zinc-700 rounded-3xl px-5 py-4 resize-y"></textarea>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-zinc-400 text-sm block mb-2">Target Style</label>
                    <input id="style" value="Jazz, Smooth, Lounge" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4">
                </div>
                <div>
                    <label class="text-zinc-400 text-sm block mb-2">Cover Title</label>
                    <input id="title" value="My Song (Jazz Cover)" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4">
                </div>
            </div>

            <!-- Start At + Gender -->
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-zinc-400 text-sm block mb-2">Start At (detik)</label>
                    <input id="continueAt" type="number" value="0" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4">
                </div>
                <div>
                    <label class="text-zinc-400 text-sm block mb-2">Vocal Gender</label>
                    <div class="flex gap-2">
                        <button type="button" onclick="setGender('m')" id="btn-m" class="flex-1 py-3 rounded-2xl border border-zinc-700">Male</button>
                        <button type="button" onclick="setGender('f')" id="btn-f" class="flex-1 py-3 bg-emerald-500 rounded-2xl">Female</button>
                    </div>
                </div>
            </div>

            <!-- Negative Tags -->
            <div>
                <label class="text-zinc-400 text-sm block mb-2">Negative Tags</label>
                <input id="negativeTags" placeholder="aggressive, auto-tune, heavy distortion" 
                       class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4">
            </div>

            <!-- Sliders -->
            <div class="space-y-6">
                <div>
                    <div class="flex justify-between mb-1 text-sm">
                        <span>Style Weight</span>
                        <span id="swVal" class="font-mono text-emerald-400">0.5</span>
                    </div>
                    <input type="range" id="styleWeight" min="0" max="1" step="0.1" value="0.5" 
                           oninput="document.getElementById('swVal').textContent=this.value" class="w-full accent-emerald-500">
                </div>
                <div>
                    <div class="flex justify-between mb-1 text-sm">
                        <span>Weirdness</span>
                        <span id="weirdVal" class="font-mono text-emerald-400">0.3</span>
                    </div>
                    <input type="range" id="weirdness" min="0" max="1" step="0.1" value="0.3" 
                           oninput="document.getElementById('weirdVal').textContent=this.value" class="w-full accent-emerald-500">
                </div>
                <div>
                    <div class="flex justify-between mb-1 text-sm">
                        <span>Source Audio Weight</span>
                        <span id="awVal" class="font-mono text-emerald-400">0.5</span>
                    </div>
                    <input type="range" id="audioWeight" min="0" max="1" step="0.1" value="0.5" 
                           oninput="document.getElementById('awVal').textContent=this.value" class="w-full accent-emerald-500">
                </div>
            </div>

            <button type="submit" 
                    class="w-full bg-emerald-500 hover:bg-emerald-600 py-6 rounded-3xl text-xl font-bold flex items-center justify-center gap-3">
                <i class="fa-solid fa-wand-magic-sparkles"></i>
                GENERATE COVER (2.5 koin)
            </button>
        </form>

        <!-- Progress -->
        <div id="progress" class="hidden mt-10 text-center">
            <div class="w-20 h-20 border-8 border-zinc-700 border-t-emerald-400 rounded-full animate-spin mx-auto"></div>
            <p id="status" class="mt-6 font-medium">Membuat task...</p>
            <p id="taskid" class="font-mono text-xs text-zinc-400 mt-1"></p>
        </div>

        <!-- Result -->
        <div id="result" class="hidden mt-10"></div>
    </div>

    <!-- History -->
    <div class="mt-12">
        <div class="flex justify-between items-center mb-4">
            <h3 class="font-semibold">Riwayat Cover (Sesi Ini)</h3>
            <button onclick="clearHistory()" class="text-red-400 text-sm">Hapus semua</button>
        </div>
        <div id="history" class="space-y-3 text-sm"></div>
    </div>
</div>

<!-- API Modal -->
<div id="api-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
    <div class="bg-zinc-900 rounded-3xl p-8 w-full max-w-md mx-4">
        <h3 class="text-2xl font-bold mb-6">Masukkan API Key APIPASS</h3>
        <input id="api-input" type="text" placeholder="sk-..." 
               class="w-full bg-zinc-800 rounded-2xl px-6 py-5 font-mono mb-8">
        <div class="flex gap-4">
            <button onclick="saveApiKey()" class="flex-1 bg-emerald-500 py-5 rounded-3xl font-bold">SIMPAN</button>
            <button onclick="hideApiModal()" class="flex-1 bg-zinc-700 py-5 rounded-3xl">Batal</button>
        </div>
    </div>
</div>

<script>
let API_KEY = localStorage.getItem('sai_roots_key') || '';
let currentTask = null;
let pollInterval = null;
let uploadedUrl = '';

function updateKeyUI() {
    document.getElementById('key-display').innerHTML = API_KEY ? 
        `✅ ${API_KEY.substring(0,8)}...` : '🔑 Masukkan Key';
}

function toggleApiModal() { document.getElementById('api-modal').classList.toggle('hidden'); }
function hideApiModal() { document.getElementById('api-modal').classList.add('hidden'); }

function saveApiKey() {
    const val = document.getElementById('api-input').value.trim();
    if (val) {
        API_KEY = val;
        localStorage.setItem('sai_roots_key', val);
        hideApiModal();
        updateKeyUI();
    }
}

function switchTab(n) {
    document.getElementById('tab0').classList.toggle('bg-emerald-500', n===0);
    document.getElementById('tab0').classList.toggle('text-white', n===0);
    document.getElementById('tab1').classList.toggle('bg-emerald-500', n===1);
    document.getElementById('tab1').classList.toggle('text-white', n===1);
    document.getElementById('url-panel').classList.toggle('hidden', n!==0);
    document.getElementById('upload-panel').classList.toggle('hidden', n!==1);
}

async function handleFileUpload(e) {
    const file = e.target.files[0];
    if (!file) return;
    document.getElementById('file-name').classList.remove('hidden');
    document.getElementById('file-name').textContent = 'Uploading... ' + file.name;

    try {
        const res = await fetch(`https://transfer.sh/${file.name}`, { method: 'PUT', body: file });
        uploadedUrl = await res.text();
        document.getElementById('audioUrl').value = uploadedUrl.trim();
        document.getElementById('file-name').innerHTML = `✅ ${file.name} <span class="text-emerald-400">(URL ready)</span>`;
    } catch(err) {
        alert('Upload gagal. Gunakan URL manual.');
    }
}

function setGender(g) {
    document.getElementById('btn-m').classList.toggle('bg-emerald-500', g==='m');
    document.getElementById('btn-f').classList.toggle('bg-emerald-500', g==='f');
}

async function createCoverTask(e) {
    e.preventDefault();
    if (!API_KEY) return alert('Masukkan API Key dulu!');

    const audioUrl = document.getElementById('audioUrl').value.trim();
    if (!audioUrl) return alert('Isi Source Audio URL atau upload file!');

    document.getElementById('result').classList.add('hidden');
    document.getElementById('progress').classList.remove('hidden');
    document.getElementById('status').textContent = 'Mengirim task...';

    const payload = {
        model: "suno/cover",
        input: {
            model_version: document.getElementById('model_version').value,
            audioUrl: audioUrl,
            customMode: document.getElementById('customMode').checked,
            instrumental: document.getElementById('instrumental').checked,
            prompt: document.getElementById('prompt').value.trim(),
            style: document.getElementById('style').value.trim(),
            title: document.getElementById('title').value.trim(),
            continueAt: parseInt(document.getElementById('continueAt').value) || 0,
            vocalGender: document.getElementById('btn-f').classList.contains('bg-emerald-500') ? 'f' : 'm',
            negativeTags: document.getElementById('negativeTags').value.trim(),
            styleWeight: parseFloat(document.getElementById('styleWeight').value),
            weirdness: parseFloat(document.getElementById('weirdness').value),
            audioWeight: parseFloat(document.getElementById('audioWeight').value)
        }
    };

    try {
        const res = await fetch('https://api.apipass.dev/api/v1/jobs/createTask', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${API_KEY}`
            },
            body: JSON.stringify(payload)
        });

        const data = await res.json();
        if (data.code !== 200) throw new Error(data.message || 'Gagal create task');

        currentTask = data.data.taskId;
        document.getElementById('taskid').textContent = currentTask;
        document.getElementById('status').textContent = 'Menunggu antrian...';

        startPolling();
    } catch (err) {
        alert('Error: ' + err.message);
        document.getElementById('progress').classList.add('hidden');
    }
}

function startPolling() {
    if (pollInterval) clearInterval(pollInterval);
    pollInterval = setInterval(async () => {
        if (!currentTask) return;
        try {
            const res = await fetch(`https://api.apipass.dev/api/v1/jobs/recordInfo?taskId=${currentTask}`, {
                headers: { 'Authorization': `Bearer ${API_KEY}` }
            });
            const json = await res.json();
            const state = json.data.state;

            if (state === 'success') {
                clearInterval(pollInterval);
                showResults(json.data.resultJson);
            } else if (state === 'fail') {
                clearInterval(pollInterval);
                alert('Task gagal: ' + (json.data.failMsg || 'Unknown'));
                document.getElementById('progress').classList.add('hidden');
            } else {
                document.getElementById('status').textContent = state === 'generating' ? 'Sedang generate cover...' : 'Dalam antrian...';
            }
        } catch(e) {}
    }, 3000);
}

function showResults(result) {
    document.getElementById('progress').classList.add('hidden');
    const div = document.getElementById('result');
    div.innerHTML = '<p class="text-emerald-400 font-bold text-center mb-6">✅ Cover berhasil dibuat!</p>';
    
    result.data.forEach(item => {
        const card = document.createElement('div');
        card.className = 'bg-zinc-800 rounded-3xl p-5 mb-6';
        card.innerHTML = `
            <img src="${item.image_url}" class="w-full h-48 object-cover rounded-2xl mb-4">
            <audio controls class="w-full mb-4"><source src="${item.audio_url}" type="audio/mpeg"></audio>
            <div class="flex gap-3">
                <a href="${item.audio_url}" download class="flex-1 text-center bg-emerald-500 py-4 rounded-2xl font-medium">Download MP3</a>
            </div>
        `;
        div.appendChild(card);
    });
    div.classList.remove('hidden');
}

function clearHistory() {
    if (confirm('Hapus semua riwayat?')) localStorage.removeItem('sai_history');
    loadHistory();
}

function loadHistory() {
    // Simple placeholder - bisa dikembangkan lebih lanjut
    document.getElementById('history').innerHTML = `<p class="text-zinc-500 text-center py-8">Riwayat akan muncul setelah generate berhasil</p>`;
}

// INIT
window.onload = () => {
    updateKeyUI();
    switchTab(0);
    setGender('f');
    loadHistory();
    console.log('%c✅ SAI Roots Cover - Versi Lengkap Siap!', 'color:#10b981; font-size:15px');
};
</script>
</body>
</html>
