<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>SAI Roots Generator - Final Edition</title>
    <style>
        body { font-family: sans-serif; background: #111; color: white; padding: 20px; }
        .box { max-width: 600px; margin: auto; background: #222; padding: 20px; border-radius: 12px; border: 2px solid #333; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border-radius: 6px; border: 1px solid #444; background: #000; color: #fff; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #2ecc71; color: white; border: none; cursor: pointer; font-weight: bold; border-radius: 6px; font-size: 16px; margin-bottom: 10px; }
        button#copyBtn { background: #3498db; display: none; }
        #finalCode { background: #000; color: #0f0; padding: 15px; border: 1px dashed #555; display: none; white-space: pre-wrap; font-size: 11px; height: 300px; overflow: auto; }
        label { color: #aaa; font-size: 13px; font-weight: bold; }
        .info { font-size: 11px; color: #3498db; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="box">
    <h2 style="text-align:center; margin-bottom:5px;">🎵 SAI Roots Generator</h2>
    <p class="info" style="text-align:center">Slug: Tanpa Spasi | Artist: SAI Roots</p>
    
    <label>Judul Lagu:</label>
    <input type="text" id="t" placeholder="Contoh: Drama Klenik" oninput="s_gen()">
    
    <label>Slug URL (Otomatis Tanpa Spasi):</label>
    <input type="text" id="s" placeholder="dramaklenik">
    
    <label>Album / Tipe Rilis:</label>
    <input type="text" id="a" placeholder="Contoh: Single / Roots Vibrations">
    
    <label>Lirik Lagu:</label>
    <textarea id="l" rows="8" placeholder="Masukkan lirik di sini..."></textarea>
    
    <button onclick="proses()">GENERATE KODE HTML</button>
    <button id="copyBtn" onclick="salin()">SALIN KODE</button>

    <pre id="finalCode"></pre>
</div>

<script>
// Fungsi buat slug otomatis TANPA SPASI
function s_gen() {
    var val = document.getElementById('t').value;
    // Menghapus karakter spesial dan menghapus semua spasi
    var slug = val.toLowerCase()
        .replace(/[^a-z0-9]/g, ''); 
    document.getElementById('s').value = slug;
}

function proses() {
    var judul = document.getElementById('t').value;
    var slug = document.getElementById('s').value;
    var album = document.getElementById('a').value || "Single";
    var lirik = document.getElementById('l').value;

    if(judul == "" || lirik == "") {
        alert("Judul dan lirik jangan kosong!");
        return;
    }

    var code = '<!DOCTYPE html>\n<html lang="id">\n<head>\n';
    code += '    <meta charset="UTF-8">\n';
    code += '    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n';
    code += '    <title>Lirik ' + judul + ' - SAI Roots | Reggae Rap Indie</title>\n';
    code += '    <meta name="description" content="Lirik lengkap lagu ' + judul + ' dari SAI Roots. Reggae rap indie Indonesia.">\n';
    code += '    <meta name="keywords" content="lirik ' + judul.toLowerCase() + ', sai roots ' + judul.toLowerCase() + ', lirik sai roots, ' + judul.toLowerCase() + ' lyrics">\n';
    code += '    <link rel="canonical" href="https://sairootsmusic.github.io/lyric/' + slug + '.html">\n\n';
    code += '    \n';
    code += '    <meta property="og:title" content="Lirik ' + judul + ' - SAI Roots">\n';
    code += '    <meta property="og:description" content="Lirik lengkap ' + judul + ' - SAI Roots">\n';
    code += '    <meta property="og:image" content="https://raw.githubusercontent.com/pembri/SAI-Roots-Official/main/sairoots.jpg">\n';
    code += '    <meta property="og:url" content="https://sairootsmusic.github.io/lyric/' + slug + '.html">\n';
    code += '    <meta property="og:type" content="music.song">\n\n';
    code += '    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">\n';
    code += '    <style>\n';
    code += '        body{margin:0;font-family:\'Poppins\',sans-serif;background:linear-gradient(135deg,#0f0f0f,#1c1c1c,#111);color:#fff;display:flex;justify-content:center;align-items:flex-start;min-height:100vh;padding:40px 20px 20px;}\n';
    code += '        .container{max-width:480px;width:100%;}.card{background:rgba(255,255,255,0.05);border-radius:25px;padding:30px 25px;backdrop-filter:blur(12px);box-shadow:0 15px 50px rgba(0,0,0,0.7);}\n';
    code += '        .back{color:#aaa;font-size:13px;text-decoration:none;display:inline-block;margin-bottom:20px;transition:0.2s;}\n';
    code += '        .back:hover{color:#fff;} h1{font-size:26px;margin:0 0 5px 0;} h2{font-size:14px;font-weight:400;color:#ccc;margin:2px 0 20px 0;}\n';
    code += '        pre{white-space:pre-wrap;line-height:1.8;color:#ddd;margin-top:25px;font-size:15.2px;background:rgba(255,255,255,0.03);padding:20px;border-radius:12px;backdrop-filter:blur(3px);}\n';
    code += '        .footer{text-align:center;font-size:12px;color:#666;margin-top:35px;}\n';
    code += '    </style>\n</head>\n<body>\n';
    code += '<div class="container"><div class="card">\n';
    code += '    <a href="https://sairootsmusic.github.io/lyric" class="back">← Kembali ke Daftar Lirik</a>\n';
    code += '    <h1>' + judul + '</h1>\n';
    code += '    <h2>SAI Roots</h2>\n';
    code += '    <h2>' + album + '</h2>\n';
    code += '    <pre>' + lirik + '</pre>\n';
    code += '    <div class="footer">© 2026 SAI Roots. All Rights Reserved.</div>\n';
    code += '</div></div>\n';
    code += '<script type="application/ld+json">\n';
    code += '{\n  "@context": "https://schema.org",\n  "@type": "MusicRecording",\n';
    code += '  "name": "' + judul + '",\n';
    code += '  "byArtist": {"@type": "MusicGroup", "name": "SAI Roots", "alternateName": "Ahmad Supembri"},\n';
    code += '  "inAlbum": {"@type": "MusicAlbum", "name": "' + album + '"},\n';
    code += '  "genre": ["Reggae", "Rap", "Indie"],\n';
    code += '  "url": "https://sairootsmusic.github.io/lyric/' + slug + '.html",\n';
    code += '  "inLanguage": "id"\n}\n';
    code += '<\/script>\n</body>\n</html>';

    var out = document.getElementById('finalCode');
    out.textContent = code;
    out.style.display = "block";
    document.getElementById('copyBtn').style.display = "block";
}

function salin() {
    var copyText = document.getElementById("finalCode").textContent;
    var el = document.createElement('textarea');
    el.value = copyText;
    document.body.appendChild(el);
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
    alert("Mantap! Kode berhasil disalin.");
}
</script>

</body>
</html>
