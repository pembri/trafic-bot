<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexa Kurs - Hyper Database</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon-p: #ff007f; --neon-b: #00f2ff; --bg: #050505; --card: rgba(15, 15, 20, 0.98); }
        body { margin: 0; background: var(--bg); font-family: 'Rajdhani', sans-serif; color: #fff; display: flex; justify-content: center; min-height: 100vh; padding: 10px; box-sizing: border-box; }
        .app-card { width: 100%; max-width: 400px; background: var(--card); border: 1px solid rgba(0,242,255,0.2); border-radius: 30px; padding: 25px; backdrop-filter: blur(20px); box-shadow: 0 0 50px #000; margin-top: 10px; }
        .header h1 { font-family: 'Orbitron', sans-serif; font-size: 1.2rem; text-align: center; letter-spacing: 4px; background: linear-gradient(90deg, var(--neon-b), var(--neon-p)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 25px; }
        .box { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 15px; margin-bottom: 12px; }
        label { font-size: 0.65rem; color: var(--neon-b); text-transform: uppercase; letter-spacing: 2px; display: block; margin-bottom: 12px; }
        .row { display: flex; flex-direction: column; gap: 8px; }
        input { width: 100%; background: none; border: none; color: #fff; font-size: 2rem; font-weight: 700; outline: none; }
        select { background: #1a1a1a; color: #fff; border: 1px solid #333; border-radius: 10px; padding: 12px; font-size: 0.85rem; width: 100%; cursor: pointer; outline: none; font-family: 'Rajdhani', sans-serif; }
        .swap-btn { width: 42px; height: 42px; background: linear-gradient(135deg, var(--neon-b), var(--neon-p)); border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; border: none; color: white; margin: 10px auto; box-shadow: 0 0 15px rgba(255, 0, 127, 0.4); }
        #rate-text { text-align: center; color: var(--neon-p); font-weight: 700; font-size: 1rem; margin-top: 15px; }
        .status { text-align: center; font-size: 0.5rem; color: #444; margin-top: 10px; letter-spacing: 1px; }
        #result { color: var(--neon-b); }
    </style>
</head>
<body>
<div class="app-card">
    <div class="header"><h1>NEXA KURS</h1></div>
    <div class="box">
        <label>Input Jumlah</label>
        <div class="row">
            <input type="number" id="amount" value="1" oninput="convert()">
            <select id="fromC" onchange="convert()"></select>
        </div>
    </div>
    <button class="swap-btn" onclick="swap()"><i class="fas fa-retweet"></i></button>
    <div class="box" style="border-color: rgba(255,0,127,0.3);">
        <label>Hasil Konversi</label>
        <div class="row">
            <input type="text" id="result" readonly>
            <select id="toC" onchange="convert()"></select>
        </div>
    </div>
    <div id="rate-text">Syncing...</div>
    <div class="status">WORLDWIDE DATABASE LOADED (150+ CURRENCIES)</div>
</div>

<script>
    const data = {
        "AFN":"Afghan Afghani","ALL":"Albanian Lek","DZD":"Algerian Dinar","AOA":"Angolan Kwanza","ARS":"Argentine Peso","AMD":"Armenian Dram","AWG":"Aruban Florin","AUD":"Australian Dollar","AZN":"Azerbaijani Manat","BSD":"Bahamian Dollar","BHD":"Bahraini Dinar","BDT":"Bangladeshi Taka","BBD":"Barbadian Dollar","BYN":"Belarusian Ruble","BZD":"Belize Dollar","BMD":"Bermudian Dollar","BTN":"Bhutanese Ngultrum","BOB":"Bolivian Boliviano","BAM":"Bosnia-Herzegovina Convertible Mark","BWP":"Botswanan Pula","BRL":"Brazilian Real","GBP":"British Pound Sterling","BND":"Brunei Dollar","BGN":"Bulgarian Lev","BIF":"Burundian Franc","KHR":"Cambodian Riel","CAD":"Canadian Dollar","CVE":"Cape Verdean Escudo","KYD":"Cayman Islands Dollar","XAF":"Central African CFA Franc","XPF":"CFP Franc","CLP":"Chilean Peso","CNY":"Chinese Yuan","COP":"Colombian Peso","KMF":"Comorian Franc","CDF":"Congolese Franc","CRC":"Costa Rican Colón","HRK":"Croatian Kuna","CUP":"Cuban Peso","CZK":"Czech Koruna","DKK":"Danish Krone","DJF":"Djiboutian Franc","DOP":"Dominican Peso","EGP":"Egyptian Pound","ERN":"Eritrean Nakfa","ETB":"Ethiopian Birr","EUR":"Euro","FJD":"Fijian Dollar","GMD":"Gambian Dalasi","GEL":"Georgian Lari","GHS":"Ghanaian Cedi","GIP":"Gibraltar Pound","GTQ":"Guatemalan Quetzal","GNF":"Guinean Franc","GYD":"Guyanese Dollar","HTG":"Haitian Gourde","HNL":"Honduran Lempira","HKD":"Hong Kong Dollar","HUF":"Hungarian Forint","ISK":"Icelandic Króna","INR":"Indian Rupee","IDR":"Indonesian Rupiah","IRR":"Iranian Rial","IQD":"Iraqi Dinar","ILS":"Israeli New Shekel","JMD":"Jamaican Dollar","JPY":"Japanese Yen","JOD":"Jordanian Dinar","KZT":"Kazakhstani Tenge","KES":"Kenyan Shilling","KWD":"Kuwaiti Dinar","KGS":"Kyrgystani Som","LAK":"Laotian Kip","LBP":"Lebanese Pound","LSL":"Lesotho Loti","LRD":"Liberian Dollar","LYD":"Libyan Dinar","MOP":"Macanese Pataca","MKD":"Macedonian Denar","MGA":"Malagasy Ariary","MWK":"Malawian Kwacha","MYR":"Malaysian Ringgit","MVR":"Maldivian Rufiyaa","MRU":"Mauritanian Ouguiya","MUR":"Mauritian Rupee","MXN":"Mexican Peso","MDL":"Moldovan Leu","MNT":"Mongolian Tugrik","MAD":"Moroccan Dirham","MZN":"Mozambican Metical","MMK":"Myanmar Kyat","NAD":"Namibian Dollar","NPR":"Nepalese Rupee","ANG":"Netherlands Antillean Guilder","TWD":"New Taiwan Dollar","NZD":"New Zealand Dollar","NIO":"Nicaraguan Córdoba","NGN":"Nigerian Naira","NOK":"Norwegian Krone","OMR":"Omani Rial","PKR":"Pakistani Rupee","PAB":"Panamanian Balboa","PGK":"Papua New Guinean Kina","PYG":"Paraguayan Guarani","PEN":"Peruvian Sol","PHP":"Philippine Peso","PLN":"Polish Zloty","QAR":"Qatari Rial","RON":"Romanian Leu","RUB":"Russian Ruble","RWF":"Rwandan Franc","SAR":"Saudi Riyal","RSD":"Serbian Dinar","SCR":"Seychellois Rupee","SLL":"Sierra Leonean Leone","SGD":"Singapore Dollar","SBD":"Solomon Islands Dollar","SOS":"Somali Shilling","ZAR":"South African Rand","KRW":"South Korean Won","SSP":"South Sudanese Pound","LKR":"Sri Lankan Rupee","SDG":"Sudanese Pound","SRD":"Surinamese Dollar","SZL":"Swazi Lilangeni","SEK":"Swedish Krona","CHF":"Swiss Franc","SYP":"Syrian Pound","TJS":"Tajikistani Somoni","TZS":"Tanzanian Shilling","THB":"Thai Baht","TOP":"Tongan Paʻanga","TTD":"Trinidad and Tobago Dollar","TND":"Tunisian Dinar","TRY":"Turkish Lira","TMT":"Turkmenistani Manat","UGX":"Ugandan Shilling","UAH":"Ukrainian Hryvnia","AED":"United Arab Emirates Dirham","USD":"United States Dollar","UYU":"Uruguayan Peso","UZS":"Uzbekistani Som","VUV":"Vanuatu Vatu","VES":"Venezuelan Bolívar","VND":"Vietnamese Dong","YER":"Yemeni Rial","ZMW":"Zambian Kwacha"
    };

    const fromS = document.getElementById('fromC'), toS = document.getElementById('toC');
    Object.entries(data).sort().forEach(([c, n]) => {
        const o = `<option value="${c}">${c} - ${n}</option>`;
        fromS.innerHTML += o; toS.innerHTML += o;
    });
    fromS.value = "USD"; toS.value = "IDR";

    async function convert() {
        const a = document.getElementById('amount').value;
        const f = fromS.value, t = toS.value;
        const rateBox = document.getElementById('rate-text');
        if (!a || a <= 0) return;
        try {
            const res = await fetch(`https://api.exchangerate-api.com/v4/latest/${f}`);
            const d = await res.json();
            const r = d.rates[t];
            document.getElementById('result').value = (a * r).toLocaleString('id-ID');
            rateBox.innerText = `1 ${f} = ${r.toLocaleString('id-ID')} ${t}`;
        } catch (e) { rateBox.innerText = "Error Connection"; }
    }
    function swap() { const temp = fromS.value; fromS.value = toS.value; toS.value = temp; convert(); }
    convert();
</script>
</body>
</html>
