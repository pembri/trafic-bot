<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexa Kurs - Konversi Mata Uang</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon-p: #ff007f; --neon-b: #00f2ff; --bg: #050505; --card: rgba(15, 15, 20, 0.98); }
        body { margin: 0; background: var(--bg); font-family: 'Rajdhani', sans-serif; color: #fff; display: flex; justify-content: center; min-height: 100vh; padding: 10px; box-sizing: border-box; }
        .app-card { width: 100%; max-width: 400px; background: var(--card); border: 1px solid rgba(0,242,255,0.2); border-radius: 30px; padding: 25px; backdrop-filter: blur(20px); box-shadow: 0 0 50px #000; margin-top: 10px; }
        .header h1 { font-family: 'Orbitron', sans-serif; font-size: 1.2rem; text-align: center; letter-spacing: 4px; background: linear-gradient(90deg, var(--neon-b), var(--neon-p)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 25px; }
        .box { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 15px; margin-bottom: 12px; }
        label { font-size: 0.65rem; color: var(--neon-b); text-transform: uppercase; letter-spacing: 2px; display: block; margin-bottom: 8px; }
        .row { display: flex; flex-direction: column; gap: 8px; }
        input { width: 100%; background: none; border: none; color: #fff; font-size: 1.8rem; font-weight: 700; outline: none; padding: 5px 0; }
        select { background: #1a1a1a; color: #fff; border: 1px solid #333; border-radius: 10px; padding: 12px; font-size: 0.85rem; width: 100%; cursor: pointer; outline: none; }
        .swap-btn { width: 42px; height: 42px; background: linear-gradient(135deg, var(--neon-b), var(--neon-p)); border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; border: none; color: white; margin: 10px auto; box-shadow: 0 0 15px rgba(255, 0, 127, 0.4); }
        #rate-text { text-align: center; color: var(--neon-p); font-weight: 700; font-size: 1rem; margin-top: 15px; }
        .status { text-align: center; font-size: 0.5rem; color: #444; margin-top: 10px; letter-spacing: 1px; }
        #result { color: var(--neon-b); }
    </style>
</head>
<body>
<div class="app-card">
    <div class="header"><h1>NEXA KURS</h1></div>
    <div class="box">
        <label>Input Jumlah (Gunakan Koma untuk Desimal)</label>
        <div class="row">
            <input type="text" id="amount" value="1" oninput="handleInput(this)" inputmode="decimal">
            <select id="fromC" onchange="convert()"></select>
        </div>
    </div>
    <button class="swap-btn" onclick="swap()"><i class="fas fa-retweet"></i></button>
    <div class="box" style="border-color: rgba(255,0,127,0.3);">
        <label>Hasil Konversi</label>
        <div class="row">
            <input type="text" id="result" readonly>
            <select id="toC" onchange="convert()"></select>
        </div>
    </div>
    <div id="rate-text">Memproses Database...</div>
    <div class="status">ULTRALIGHT DATABASE ENGINE ACTIVE</div>
</div>

<script>
    let currencyCodes = [];

    // Fungsi fetch database lengkap (1000+ pair didukung oleh API)
    async function initApp() {
        try {
            const res = await fetch('https://open.er-api.com/v6/latest/USD');
            const d = await res.json();
            currencyCodes = Object.keys(d.rates).sort();
            
            const fromS = document.getElementById('fromC'), toS = document.getElementById('toC');
            currencyCodes.forEach(c => {
                const o = `<option value="${c}">${c}</option>`;
                fromS.innerHTML += o; toS.innerHTML += o;
            });
            fromS.value = "USD"; toS.value = "IDR";
            convert();
        } catch (e) { document.getElementById('rate-text').innerText = "API Error"; }
    }

    function handleInput(el) {
        // Biarkan pengguna mengetik koma, tapi hapus karakter ilegal lainnya
        let val = el.value.replace(/[^0-9,]/g, "");
        
        // Pastikan hanya ada satu koma
        const parts = val.split(",");
        if (parts.length > 2) val = parts[0] + "," + parts.slice(1).join("");
        
        // Format bagian ribuan dengan titik
        let integerPart = parts[0].replace(/\D/g, "");
        if (integerPart !== "") {
            integerPart = parseInt(integerPart).toLocaleString('id-ID');
        }
        
        el.value = parts.length > 1 ? integerPart + "," + parts[1] : integerPart;
        convert();
    }

    async function convert() {
        // Ubah format tampilan (titik & koma) kembali ke angka standar komputer
        let rawVal = document.getElementById('amount').value.replace(/\./g, "").replace(",", ".");
        if (!rawVal || isNaN(rawVal)) return;

        const f = document.getElementById('fromC').value;
        const t = document.getElementById('toC').value;
        
        try {
            const res = await fetch(`https://open.er-api.com/v6/latest/${f}`);
            const d = await res.json();
            const rate = d.rates[t];
            const final = (parseFloat(rawVal) * rate);
            
            // Tampilkan hasil dengan format Indonesia (Titik ribuan, Koma desimal)
            document.getElementById('result').value = final.toLocaleString('id-ID', { maximumFractionDigits: 2 });
            document.getElementById('rate-text').innerText = `1 ${f} = ${rate.toLocaleString('id-ID')} ${t}`;
        } catch (e) {}
    }

    function swap() {
        const f = document.getElementById('fromC'), t = document.getElementById('toC');
        const temp = f.value; f.value = t.value; t.value = temp;
        convert();
    }

    initApp();
</script>
</body>
</html>
