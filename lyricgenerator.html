    <style>
        :root { --primary: #2ecc71; --accent: #3498db; --bg: #0f0f0f; --card-bg: #1a1a1a; }

        .box { max-width: 850px; margin: 40px auto; background: var(--card-bg); padding: 30px; border-radius: 24px; border: 1px solid #333; box-shadow: 0 25px 50px rgba(0,0,0,0.6); }
        h2 { text-align: center; color: var(--primary); letter-spacing: 2px; margin-bottom: 25px; font-weight: 800; }
        label { display: block; color: #888; font-size: 11px; font-weight: bold; text-transform: uppercase; margin-bottom: 5px; margin-top: 15px; letter-spacing: 1px; }
        input { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #333; background: #000; color: #fff; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--primary); }
        
        /* EDITOR FULL SCREEN LOGIC */
        .lyric-container { position: relative; width: 100%; margin-top: 5px; }
        textarea { 
            width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #333; 
            background: #000; color: #fff; box-sizing: border-box; font-size: 16px;
            min-height: 250px; transition: 0.3s; resize: vertical; outline: none;
        }
        .fs-btn {
            position: absolute; right: 10px; top: 10px; background: var(--primary);
            border: none; color: #000; padding: 6px 12px; border-radius: 8px;
            cursor: pointer; font-size: 11px; font-weight: bold; z-index: 10;
        }
        .full-screen-active {
            position: fixed !important; top: 0 !important; left: 0 !important; 
            width: 100vw !important; height: 100vh !important; 
            z-index: 9999 !important; background: #000 !important; 
            padding: 60px 20px 20px 20px !important; border: none !important; border-radius: 0 !important;
        }
        .exit-btn {
            display: none; position: fixed; top: 15px; right: 15px;
            background: #e74c3c; color: white; border: none;
            width: 40px; height: 40px; border-radius: 50%;
            font-size: 20px; font-weight: bold; cursor: pointer; z-index: 10000;
        }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        button#mainGen { width: 100%; padding: 18px; background: linear-gradient(135deg, #27ae60, #2ecc71); color: white; border: none; cursor: pointer; font-weight: 900; border-radius: 14px; font-size: 16px; margin-top: 25px; text-transform: uppercase; }
        button#copyBtn { width: 100%; padding: 18px; background: linear-gradient(135deg, #2980b9, #3498db); color: white; border: none; cursor: pointer; display: none; margin-top: 12px; border-radius: 14px; font-weight: 900; }
        #finalCode { background: #050505; color: #2ecc71; padding: 20px; border-radius: 15px; border: 1px solid #222; display: none; white-space: pre-wrap; font-size: 11px; height: 350px; overflow: auto; margin-top: 25px; font-family: 'Courier New', monospace; border-left: 4px solid var(--primary); }
    </style>
</head>
<body>

<div class="box">
    <h2>🎵 SAI ROOTS GEN V8.2</h2>
    
    <label>Judul Lagu:</label>
    <input type="text" id="t" placeholder="Masukkan Judul..." oninput="s_gen()">
    
    <div class="grid">
        <div><label>Artist Utama:</label><input type="text" id="art" value="SAI Roots"></div>
        <div><label>Album:</label><input type="text" id="a" value="Single"></div>
    </div>

    <div class="grid">
        <div><label>Slug URL (File):</label><input type="text" id="s" placeholder="slugurl"></div>
        <div><label>Tahun Rilis:</label><input type="text" id="yr" value="2026"></div>
    </div>
    
    <label>Lirik Lagu:</label>
    <div class="lyric-container">
        <button class="fs-btn" id="fsBtn" onclick="openFS()">Full Screen</button>
        <button class="exit-btn" id="exitBtn" onclick="closeFS()">×</button>
        <textarea id="l" placeholder="Paste lirik di sini..."></textarea>
    </div>
    
    <button id="mainGen" onclick="proses()">GENERATE PLATFORM INVADER CODE</button>
    <button id="copyBtn" onclick="salin()">SALIN KODE HTML</button>

    <pre id="finalCode"></pre>
</div>

<script>
    function openFS() {
        document.getElementById('l').classList.add('full-screen-active');
        document.getElementById('exitBtn').style.display = 'block';
        document.getElementById('fsBtn').style.display = 'none';
    }

    function closeFS() {
        document.getElementById('l').classList.remove('full-screen-active');
        document.getElementById('exitBtn').style.display = 'none';
        document.getElementById('fsBtn').style.display = 'block';
    }

    function s_gen() {
        var val = document.getElementById('t').value;
        var slug = val.toLowerCase().replace(/[^a-z0-9]/g, ''); 
        document.getElementById('s').value = slug;
    }

    function aiSmartFix(text) {
        return text.split('\n').map(line => {
            let l = line.trim();
            if (l === "") return "";
            l = l.replace(/(\w)-(\w)/g, '$1 $2').replace(/\.+$/, ""); 
            return l.charAt(0).toUpperCase() + l.slice(1); 
        }).join('\n');
    }

    function proses() {
        var judul = document.getElementById('t').value;
        var artist = document.getElementById('art').value;
        var slugInput = document.getElementById('s').value;
        var album = document.getElementById('a').value;
        var tahun = document.getElementById('yr').value;
        var lirik = aiSmartFix(document.getElementById('l').value);
        var songParam = judul.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');

    function salin() {
        var copyText = document.getElementById("finalCode").textContent;
        var el = document.createElement('textarea');

        el.select();
