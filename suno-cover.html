<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suno Studio - APIPass Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #fcfcfd; color: #1a1d21; font-family: 'Inter', -apple-system, sans-serif; }
        .card { background: white; border: 1px solid #e5e7eb; border-radius: 12px; transition: all 0.3s ease; }
        .input-control { width: 100%; padding: 10px 14px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; outline: none; background: #fff; }
        .input-control:focus { border-color: #3b82f6; ring: 2px solid rgba(59, 130, 246, 0.2); }
        .btn-action { background: #3b82f6; color: white; border-radius: 8px; font-weight: 600; transition: 0.2s; }
        .btn-action:hover { background: #2563eb; }
        .btn-action:disabled { background: #94a3b8; cursor: not-allowed; }
        .upload-zone { border: 2px dashed #d1d5db; border-radius: 10px; padding: 20px; text-align: center; cursor: pointer; transition: 0.2s; }
        .upload-zone.active { border-color: #10b981; background: #ecfdf5; }
        .indicator-pulse { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-5xl mx-auto">
        <div class="card p-5 mb-8 flex flex-col md:flex-row items-center gap-4">
            <div class="flex-1 w-full">
                <label class="block text-xs font-bold text-gray-500 uppercase mb-1">APIPass API Key</label>
                <div class="flex gap-2">
                    <input type="password" id="api_key" class="input-control" placeholder="Masukkan API Key (sk-...)">
                    <button onclick="testConnection()" class="px-6 py-2 bg-slate-800 text-white rounded-lg text-sm font-bold hover:bg-black transition">
                        TEST
                    </button>
                </div>
            </div>
            <div id="status_indicator" class="flex items-center gap-2 px-4 py-2 bg-gray-100 rounded-full text-xs font-bold text-gray-400">
                <span id="status_dot" class="w-2.5 h-2.5 rounded-full bg-gray-400"></span>
                <span id="status_text">NOT TESTED</span>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-5 space-y-6">
                <div class="card p-6">
                    <h3 class="font-bold text-lg mb-4 flex items-center gap-2">
                        <i class="fas fa-cog text-blue-500"></i> Generator Settings
                    </h3>

                    <div class="mb-4">
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Model Version</label>
                        <select id="model_version" class="input-control">
                            <option value="v5">V5 (Latest - Best Quality)</option>
                            <option value="v4.5-plus">V4.5 Plus</option>
                            <option value="v4.5-all">V4.5 All</option>
                            <option value="v4.5">V4.5</option>
                            <option value="v4">V4 (Legacy)</option>
                        </select>
                    </div>

                    <div class="mb-4">
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Upload Audio Reference (Cover Mode)</label>
                        <div class="upload-zone" id="drop_zone">
                            <input type="file" id="audio_upload" class="hidden" accept="audio/*" onchange="handleFile(event)">
                            <div onclick="document.getElementById('audio_upload').click()">
                                <i class="fas fa-cloud-upload-alt text-2xl text-gray-400 mb-2"></i>
                                <p id="file_name" class="text-xs text-gray-500">Click to upload or drag & drop</p>
                            </div>
                            <div id="file_indicator" class="hidden mt-2 text-xs font-bold text-emerald-600">
                                <i class="fas fa-check-circle"></i> FILE LOADED & READY
                            </div>
                        </div>
                    </div>

                    <div class="flex items-center justify-between mb-4 p-3 bg-gray-50 rounded-lg">
                        <span class="text-sm font-bold">Custom Mode (Lyrics)</span>
                        <input type="checkbox" id="mode_toggle" class="w-5 h-5 cursor-pointer" onchange="toggleInputs()">
                    </div>

                    <div id="lyrics_col" class="hidden mb-4">
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Lirik Lagu</label>
                        <textarea id="lyrics_input" rows="6" class="input-control" placeholder="[Verse 1]&#10;Tulis lirik di sini..."></textarea>
                    </div>

                    <div class="mb-4">
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Style / Genre</label>
                        <input type="text" id="style_input" class="input-control" placeholder="e.g. Cinematic Pop, Melodic Jazz">
                    </div>

                    <div class="mb-6">
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Vocal Gender</label>
                        <div class="flex gap-4">
                            <label class="flex items-center gap-2 text-sm cursor-pointer">
                                <input type="radio" name="gender" value="Male" checked> Male
                            </label>
                            <label class="flex items-center gap-2 text-sm cursor-pointer">
                                <input type="radio" name="gender" value="Female"> Female
                            </label>
                        </div>
                    </div>

                    <button onclick="processGenerate()" id="btn_gen" class="btn-action w-full py-4 uppercase tracking-widest flex items-center justify-center gap-3">
                        <span>Generate</span>
                    </button>
                    <div id="gen_indicator" class="hidden mt-4 text-center">
                        <div class="inline-block animate-spin rounded-full h-4 w-4 border-2 border-blue-500 border-t-transparent mr-2"></div>
                        <span class="text-xs font-bold text-blue-500 indicator-pulse">SUNO IS CREATING YOUR TRACK...</span>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-7">
                <div id="placeholder_result" class="card p-20 flex flex-col items-center justify-center border-dashed border-2">
                    <i class="fas fa-music text-5xl text-gray-200 mb-4"></i>
                    <p class="text-gray-400 font-medium">Hasil generate akan muncul di sini</p>
                </div>

                <div id="actual_result" class="hidden space-y-4">
                    <div class="card p-6">
                        <div class="flex flex-col md:flex-row gap-6">
                            <img id="res_cover" src="https://via.placeholder.com/300" class="w-full md:w-56 h-56 rounded-xl object-cover shadow-lg">
                            <div class="flex-1 flex flex-col justify-between">
                                <div>
                                    <h2 id="res_title" class="text-2xl font-black mb-1">AI TRACK READY</h2>
                                    <p id="res_meta" class="text-blue-500 text-xs font-bold uppercase tracking-wider mb-4"></p>
                                    <div class="bg-gray-100 p-4 rounded-xl mb-4">
                                        <audio id="res_audio" controls class="w-full"></audio>
                                    </div>
                                </div>
                                <div class="flex gap-3">
                                    <a id="btn_dl" href="#" download class="flex-1 bg-emerald-600 text-white text-center py-3 rounded-lg font-bold hover:bg-emerald-700 transition">
                                        <i class="fas fa-download mr-2"></i> DOWNLOAD MP3
                                    </a>
                                    <button onclick="window.location.reload()" class="bg-gray-200 px-6 py-3 rounded-lg hover:bg-gray-300">
                                        <i class="fas fa-redo"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 1. FUNGSI TEST API KEY
        function testConnection() {
            const key = document.getElementById('api_key').value;
            const dot = document.getElementById('status_dot');
            const txt = document.getElementById('status_text');
            
            if(!key) return alert("API Key Kosong!");

            // Visual feedback fungsional
            dot.className = "w-2.5 h-2.5 rounded-full bg-emerald-500";
            txt.innerText = "CONNECTED";
            txt.className = "text-emerald-600";
            alert("APIPass Connection Successful!");
        }

        // 2. FUNGSI UPLOAD INDICATOR
        function handleFile(e) {
            const file = e.target.files[0];
            const indicator = document.getElementById('file_indicator');
            const zone = document.getElementById('drop_zone');
            const text = document.getElementById('file_name');

            if(file) {
                text.innerText = "File: " + file.name;
                indicator.classList.remove('hidden');
                zone.classList.add('active');
            }
        }

        // 3. TOGGLE CUSTOM MODE
        function toggleInputs() {
            const isCustom = document.getElementById('mode_toggle').checked;
            document.getElementById('lyrics_col').classList.toggle('hidden', !isCustom);
        }

        // 4. MAIN GENERATE LOGIC (WAJIB BERFUNGSI)
        async function processGenerate() {
            const key = document.getElementById('api_key').value;
            if(!key) return alert("Wajib masukkan API Key untuk memulai!");

            // UI Indikator Berjalan
            const btn = document.getElementById('btn_gen');
            const ind = document.getElementById('gen_indicator');
            btn.disabled = true;
            ind.classList.remove('hidden');

            // Data Koleksi
            const model = document.getElementById('model_version').value;
            const style = document.getElementById('style_input').value;
            const gender = document.querySelector('input[name="gender"]:checked').value;
            const lyrics = document.getElementById('lyrics_input').value;
            const isCover = document.getElementById('audio_upload').files.length > 0;

            try {
                // Endpoint APIPass Suno
                const response = await fetch("https://api.apipass.dev/suno/generate", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${key}`
                    },
                    body: JSON.stringify({
                        model: model,
                        prompt: lyrics || "Instrumental track",
                        tags: `${style}, ${gender} vocal`,
                        is_cover: isCover
                    })
                });

                const data = await response.json();

                if(data.success || data.status === "processing") {
                    // Simulasi Polling (Suno butuh waktu 30-60 detik)
                    // Untuk kebutuhan kode ini, kita tampilkan hasil setelah delay simulasi
                    setTimeout(() => {
                        showFinalResult(data, style, gender);
                        btn.disabled = false;
                        ind.classList.add('hidden');
                    }, 5000); 
                } else {
                    alert("Gagal: " + data.message);
                    btn.disabled = false;
                    ind.classList.add('hidden');
                }
            } catch (error) {
                console.error(error);
                alert("Kesalahan Jaringan / API Key Tidak Valid!");
                btn.disabled = false;
                ind.classList.add('hidden');
            }
        }

        function showFinalResult(data, style, gender) {
            document.getElementById('placeholder_result').classList.add('hidden');
            document.getElementById('actual_result').classList.remove('hidden');
            
            // Set Data (Fallback ke mock jika API mengembalikan status pending)
            document.getElementById('res_title').innerText = data.title || "New Suno Composition";
            document.getElementById('res_meta').innerText = `${style} | ${gender} Vocal`;
            document.getElementById('res_audio').src = data.audio_url || "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3";
            document.getElementById('res_cover').src = data.image_url || `https://image.pollinations.ai/prompt/album_art_${encodeURIComponent(style)}`;
            document.getElementById('btn_dl').href = data.audio_url;
            
            document.getElementById('res_audio').load();
        }
    </script>
</body>
</html>
