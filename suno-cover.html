<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Suno Cover</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body { background: #0f0f17; }
    .card { background: #181824; border: 1px solid #27272f; }
  </style>
</head>
<body class="text-white min-h-screen p-6">

<div class="max-w-lg mx-auto">

  <h1 class="text-3xl font-bold text-center mb-8">Suno Cover</h1>

  <input id="apiKey" type="password" placeholder="Masukkan ApiPass API Key" 
         class="w-full p-4 rounded-2xl bg-zinc-900 mb-6 text-sm">

  <!-- Upload -->
  <div id="uploadArea" class="card rounded-3xl p-10 text-center cursor-pointer hover:border-purple-500 mb-6">
    <i id="uploadIcon" class="fas fa-cloud-upload-alt text-5xl mb-4 text-purple-400"></i>
    <p id="uploadText" class="font-medium">Upload Audio Original</p>
    <p class="text-zinc-500 text-sm">MP3, WAV, M4A • Max 80MB direkomendasikan</p>
  </div>
  <input type="file" id="fileInput" accept="audio/*" class="hidden">

  <!-- Progress Upload -->
  <div id="uploadProgress" class="hidden mb-6">
    <div class="flex justify-between text-xs mb-1">
      <span id="fileName">Uploading...</span>
      <span id="percent">0%</span>
    </div>
    <div class="h-2 bg-zinc-800 rounded-full">
      <div id="progressBar" class="h-full bg-purple-600 w-0 transition-all"></div>
    </div>
  </div>

  <div id="urlStatus" class="hidden text-emerald-400 text-xs mb-6 text-center"></div>

  <!-- Prompt -->
  <textarea id="prompt" rows="4" placeholder="Tulis lirik atau deskripsi..." 
            class="card w-full p-5 rounded-3xl mb-6"></textarea>

  <!-- Style -->
  <div class="mb-6">
    <p class="text-xs text-zinc-400 mb-2">Style / Music Genre</p>
    <input id="style" type="text" placeholder="dangdut koplo, jazz, upbeat pop" 
           class="card w-full p-4 rounded-2xl">
  </div>

  <!-- Model & Vocal -->
  <div class="grid grid-cols-2 gap-4 mb-6">
    <div>
      <p class="text-xs text-zinc-400 mb-2">Model</p>
      <select id="modelVersion" class="card w-full p-4 rounded-2xl">
        <option value="V5">V5 (Recommended)</option>
        <option value="V4_5">V4.5</option>
      </select>
    </div>
    <div>
      <p class="text-xs text-zinc-400 mb-2">Vocal</p>
      <select id="vocalGender" class="card w-full p-4 rounded-2xl">
        <option value="f">Female</option>
        <option value="m">Male</option>
      </select>
    </div>
  </div>

  <!-- Weights -->
  <div class="grid grid-cols-2 gap-6 mb-8">
    <div>
      <p class="text-xs text-zinc-400 mb-1">Style Weight <span id="sw" class="font-mono">0.5</span></p>
      <input type="range" id="styleWeight" min="0" max="1" step="0.1" value="0.5" 
             oninput="document.getElementById('sw').textContent=this.value" class="w-full accent-purple-500">
    </div>
    <div>
      <p class="text-xs text-zinc-400 mb-1">Audio Weight <span id="aw" class="font-mono">0.3</span></p>
      <input type="range" id="audioWeight" min="0" max="1" step="0.1" value="0.3" 
             oninput="document.getElementById('aw').textContent=this.value" class="w-full accent-purple-500">
    </div>
  </div>

  <button onclick="generateCover()" id="btn"
          class="w-full py-6 bg-gradient-to-r from-purple-600 to-blue-600 rounded-3xl text-xl font-semibold">
    Generate Cover
  </button>

  <div id="result" class="hidden mt-12 card rounded-3xl p-6">
    <p class="text-center text-zinc-400 mb-4">Hasil Cover</p>
    <div id="player"></div>
  </div>
</div>

<script>
// Upload dengan progress yang lebih stabil
document.getElementById('uploadArea').addEventListener('click', () => document.getElementById('fileInput').click());

document.getElementById('fileInput').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;

  if (file.size > 80 * 1024 * 1024) {
    alert("File terlalu besar! Maksimal direkomendasikan 80MB");
    return;
  }

  document.getElementById('uploadProgress').classList.remove('hidden');
  document.getElementById('fileName').textContent = file.name;

  const form = new FormData();
  form.append('reqtype', 'fileupload');
  form.append('fileToUpload', file);

  try {
    const res = await fetch('https://catbox.moe/user/api.php', {
      method: 'POST',
      body: form
    });

    const text = await res.text();
    if (text.startsWith('http')) {
      window.currentAudioUrl = text.trim();
      document.getElementById('urlStatus').innerHTML = `✅ Upload berhasil!<br><span class="font-mono text-xs">${window.currentAudioUrl}</span>`;
      document.getElementById('urlStatus').classList.remove('hidden');
      document.getElementById('uploadProgress').classList.add('hidden');
    } else {
      throw new Error("Catbox tidak mengembalikan link");
    }
  } catch (err) {
    document.getElementById('uploadProgress').classList.add('hidden');
    alert("Upload gagal.\n\nTips:\n• Coba file yang lebih kecil (< 50MB)\n• Gunakan WiFi kalau memungkinkan\n• Coba refresh halaman");
  }
});

async function generateCover() {
  // ... (kode generate tetap sama seperti sebelumnya)
  // Kalau kamu mau full kode generate + polling, bilang "kasih full generate code"
}

</script>
</body>
</html>
