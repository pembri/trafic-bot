<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STREAM ULTIMATE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ff0000; --bg: #050505; --surface: #121212; --text: #ffffff; }
        body { margin: 0; background: var(--bg); font-family: 'Inter', sans-serif; color: var(--text); display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar Gahar */
        nav { width: 70px; background: #000; display: flex; flex-direction: column; align-items: center; padding: 25px 0; border-right: 1px solid #1a1a1a; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        nav:hover { width: 220px; }
        .logo-box { font-weight: 900; color: var(--primary); font-size: 1.5rem; margin-bottom: 50px; letter-spacing: -1px; }
        .nav-item { width: 100%; padding: 15px 0; display: flex; align-items: center; color: #444; cursor: pointer; transition: 0.3s; text-decoration: none; padding-left: 24px; position: relative; }
        .nav-item i { font-size: 1.2rem; min-width: 25px; }
        .nav-text { opacity: 0; margin-left: 20px; font-weight: 700; white-space: nowrap; transition: 0.3s; }
        nav:hover .nav-text { opacity: 1; }
        .nav-item:hover, .nav-item.active { color: var(--text); }
        .nav-item.active::before { content: ""; position: absolute; left: 0; height: 100%; width: 4px; background: var(--primary); box-shadow: 0 0 15px var(--primary); }

        /* Main Content */
        main { flex: 1; overflow-y: auto; scroll-behavior: smooth; background: linear-gradient(to bottom, #0a0a0a, #050505); }

        /* Hero Player Section */
        .hero-section { position: relative; width: 100%; aspect-ratio: 21/9; background: #000; overflow: hidden; }
        #main-player { width: 100%; height: 100%; border: none; }
        .player-overlay { position: absolute; bottom: 0; left: 0; width: 100%; padding: 40px; background: linear-gradient(transparent, rgba(5,5,5,1)); pointer-events: none; }
        .player-overlay h1 { font-size: 2.5rem; font-weight: 900; margin: 0; text-transform: uppercase; letter-spacing: -1px; }

        .container { padding: 0 40px 40px; }

        /* Search Bar */
        .search-container { margin: -30px 0 40px; position: relative; z-index: 10; }
        .search-bar { background: var(--surface); border: 1px solid #222; border-radius: 12px; padding: 12px 25px; display: flex; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .search-bar input { background: none; border: none; color: #fff; flex: 1; padding: 10px; font-size: 1rem; outline: none; }
        .search-bar i { color: #444; }

        /* Movie Grid */
        .section-title { font-size: 1.2rem; font-weight: 800; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .section-title::after { content: ""; flex: 1; height: 1px; background: #1a1a1a; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        
        .card { background: var(--surface); border-radius: 12px; overflow: hidden; cursor: pointer; transition: 0.3s; position: relative; border: 1px solid transparent; }
        .card:hover { transform: scale(1.05); border-color: #333; z-index: 5; }
        .card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
        .card-info { padding: 15px; }
        .card-title { font-size: 0.9rem; font-weight: 700; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card-meta { font-size: 0.7rem; color: #666; display: flex; justify-content: space-between; }
        .rating { color: #ffc107; }

        @media (max-width: 768px) {
            nav { display: none; }
            .hero-section { aspect-ratio: 16/9; }
            .player-overlay h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

<nav>
    <div class="logo-box">S.U</div>
    <div class="nav-item active"><i class="fas fa-th-large"></i> <span class="nav-text">BROWSE</span></div>
    <div class="nav-item"><i class="fas fa-bolt"></i> <span class="nav-text">TRENDING</span></div>
    <div class="nav-item"><i class="fas fa-play"></i> <span class="nav-text">CINEMA</span></div>
    <div class="nav-item"><i class="fas fa-heart"></i> <span class="nav-text">MY LIST</span></div>
</nav>

<main>
    <div class="hero-section">
        <iframe id="main-player" src="https://www.youtube.com/embed/xy8aJw1vYHo?rel=0&showinfo=0&autoplay=0" allowfullscreen></iframe>
        <div class="player-overlay">
            <h1 id="current-title">STREAM ULTIMATE</h1>
        </div>
    </div>

    <div class="container">
        <div class="search-container">
            <div class="search-bar">
                <i class="fas fa-search"></i>
                <input type="text" id="findBox" placeholder="Search movies, trailers, or genres..." onkeyup="doSearch()">
            </div>
        </div>

        <div class="section-title">TOP PICKS FOR YOU</div>
        <div class="grid" id="mainGrid">
            </div>
    </div>
</main>

<script>
    const db = [
        {title: "Joker: Folie à Deux", id: "xy8aJw1vYHo", genre: "Thriller", year: "2024"},
        {title: "Deadpool & Wolverine", id: "73_1biulkYk", genre: "Action", year: "2024"},
        {title: "Kingdom of the Planet of the Apes", id: "Kdr5oedn7q8", genre: "Sci-Fi", year: "2024"},
        {title: "Spider-Man: Across the Spider-Verse", id: "shW9i6k8cB0", genre: "Animation", year: "2023"},
        {title: "The Batman", id: "mqqft22hyLE", genre: "Action", year: "2022"},
        {title: "Inception", id: "YoHD9XEInc0", genre: "Sci-Fi", year: "2010"},
        {title: "Interstellar", id: "zSWdZVtge7E", genre: "Sci-Fi", year: "2014"},
        {title: "Gladiator II", id: "1E_KSuC2Y_Q", genre: "Epic", year: "2024"}
    ];

    function build() {
        const grid = document.getElementById('mainGrid');
        grid.innerHTML = db.map((m, i) => `
            <div class="card" onclick="play('${m.id}', '${m.title}')">
                <img src="https://img.youtube.com/vi/${m.id}/maxresdefault.jpg" onerror="this.src='https://img.youtube.com/vi/${m.id}/hqdefault.jpg'">
                <div class="card-info">
                    <div class="card-title">${m.title}</div>
                    <div class="card-meta">
                        <span>${m.genre} • ${m.year}</span>
                        <span class="rating"><i class="fas fa-star"></i> 8.5</span>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function play(id, title) {
        document.getElementById('main-player').src = `https://www.youtube.com/embed/${id}?autoplay=1&rel=0`;
        document.getElementById('current-title').innerText = title;
        document.querySelector('main').scrollTo({ top: 0, behavior: 'smooth' });
    }

    function doSearch() {
        const val = document.getElementById('findBox').value.toLowerCase();
        const cards = document.getElementsByClassName('card');
        db.forEach((m, i) => {
            cards[i].style.display = (m.title.toLowerCase().includes(val) || m.genre.toLowerCase().includes(val)) ? "block" : "none";
        });
    }

    build();
</script>

</body>
</html>
