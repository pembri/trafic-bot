<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bot Traffic v2</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🚀 Traffic Bot Pro</h1>
        <p>Simple Stress Test Tool</p>
    </div>

    <div style="margin-bottom: 20px;">
        <label>Target URL</label>
        <input type="text" id="targetUrl" placeholder="https://example.com">
    </div>

    <div class="row">
        <div class="col">
            <label>Interval (Detik)</label>
            <input type="number" id="intervalTime" value="3">
        </div>
        <div class="col">
            <label>Threads</label>
            <input type="number" id="threads" value="1">
        </div>
    </div>

    <button class="btn start" id="mainBtn" onclick="toggleBot()">Start Engine</button>

    <div class="stats-container">
        <div class="stat-card">
            <label>Total Hits</label>
            <span class="stat-val" id="countDisplay">0</span>
        </div>
        <div class="stat-card">
            <label>Status</label>
            <span class="stat-val" id="statusText" style="color:var(--danger)">IDLE</span>
        </div>
    </div>

    <div class="log-box" id="logBox">> System ready...</div>
</div>

<script src="script.js"></script>
</body>
</html>
