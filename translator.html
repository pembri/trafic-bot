<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZenTranslate - Alat Penerjemah Ringan</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --p: #6366f1; --s: #a855f7; --accent: #4ade80;
            --bg: #030712; --card: rgba(17, 24, 39, 0.8);
        }

        body {
            margin: 0; padding: 15px; font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, #030712);
            min-height: 100vh; color: #fff; display: flex; justify-content: center;
        }

        .app-container {
            width: 100%; max-width: 450px; background: var(--card);
            backdrop-filter: blur(30px); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 35px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            overflow: hidden; animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .header { padding: 30px 20px 10px; text-align: center; }
        .header h1 {
            font-family: 'Orbitron', sans-serif; font-size: 1.4rem; margin: 0;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            letter-spacing: 5px;
        }

        .lang-control {
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(0,0,0,0.4); margin: 20px; padding: 12px 20px;
            border-radius: 20px; border: 1px solid rgba(255,255,255,0.05);
        }

        select {
            background: none; color: #fff; border: none; font-size: 0.8rem;
            font-weight: 600; outline: none; width: 40%; cursor: pointer;
        }

        .swap-btn {
            width: 35px; height: 35px; background: linear-gradient(135deg, var(--p), var(--s));
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            cursor: pointer; transition: 0.3s;
        }

        .input-box, .output-box { padding: 20px 25px; position: relative; }
        
        textarea {
            width: 100%; background: transparent; border: none; color: #fff;
            font-size: 1.1rem; resize: none; outline: none; min-height: 100px;
        }

        .res-text { color: var(--accent); font-size: 1.1rem; min-height: 50px; line-height: 1.6; }

        .action-bar {
            display: flex; gap: 15px; margin-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.05); padding-top: 15px;
        }

        .btn-premium {
            background: rgba(255,255,255,0.05); border: none; color: #94a3b8;
            padding: 10px; border-radius: 12px; cursor: pointer; transition: 0.2s;
            display: flex; align-items: center; gap: 8px; font-size: 0.75rem;
        }
        .btn-premium:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .btn-premium.active { color: #f87171; animation: pulse 1.5s infinite; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        .status-badge {
            text-align: center; font-size: 0.6rem; color: #4b5563;
            letter-spacing: 2px; padding-bottom: 20px; text-transform: uppercase;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header"><h1>ZENTRANSLATE</h1></div>

    <div class="lang-control">
        <select id="srcLang"><option value="auto">AUTO DETECT</option></select>
        <div class="swap-btn" onclick="swap()"><i class="fas fa-random"></i></div>
        <select id="targetLang"></select>
    </div>

    <div class="input-box">
        <textarea id="inputText" placeholder="Ketik atau gunakan Mic..." oninput="trigger()"></textarea>
        <div class="action-bar">
            <button class="btn-premium" id="micBtn" onclick="toggleMic()">
                <i class="fas fa-microphone"></i> VOICE
            </button>
            <button class="btn-premium" onclick="clearText()">
                <i class="fas fa-trash"></i> CLEAR
            </button>
        </div>
    </div>

    <div class="output-box" style="background: rgba(255,255,255,0.01);">
        <div id="outputText" class="res-text">...</div>
        <div class="action-bar">
            <button class="btn-premium" onclick="speakResult()">
                <i class="fas fa-volume-up"></i> LISTEN
            </button>
            <button class="btn-premium" onclick="copyResult()">
                <i class="fas fa-copy"></i> COPY
            </button>
        </div>
    </div>

    <div class="status-badge" id="status">ELITE ENGINE READY</div>
</div>

<script>
    // Database Bahasa Premium (Full List)
    const langs = {"af":"Afrikaans","sq":"Albanian","am":"Amharic","ar":"Arabic","hy":"Armenian","az":"Azerbaijani","eu":"Basque","be":"Belarusian","bn":"Bengali","bs":"Bosnian","bg":"Bulgarian","ca":"Catalan","ceb":"Cebuano","ny":"Chichewa","zh-CN":"Chinese (Simplified)","zh-TW":"Chinese (Traditional)","co":"Corsican","hr":"Croatian","cs":"Czech","da":"Danish","nl":"Dutch","en":"English","eo":"Esperanto","et":"Estonian","tl":"Filipino","fi":"Finnish","fr":"French","fy":"Frisian","gl":"Galician","ka":"Georgian","de":"German","el":"Greek","gu":"Gujarati","ht":"Haitian Creole","ha":"Hausa","haw":"Hawaiian","iw":"Hebrew","hi":"Hindi","hmn":"Hmong","hu":"Hungarian","is":"Icelandic","ig":"Igbo","id":"Indonesian","ga":"Irish","it":"Italian","ja":"Japanese","jw":"Javanese","kn":"Kannada","kk":"Kazakh","km":"Khmer","ko":"Korean","ku":"Kurdish (Kurmanji)","ky":"Kyrgyz","lo":"Lao","la":"Latin","lv":"Latvian","lt":"Lithuanian","lb":"Luxembourgish","mk":"Macedonian","mg":"Malagasy","ms":"Malay","ml":"Malayalam","mt":"Maltese","mi":"Maori","mr":"Marathi","mn":"Mongolian","my":"Myanmar (Burmese)","ne":"Nepalese","no":"Norwegian","ps":"Pashto","fa":"Persian","pl":"Polish","pt":"Portuguese","pa":"Punjabi","ro":"Romanian","ru":"Russian","sm":"Samoan","gd":"Scots Gaelic","sr":"Serbian","st":"Sesotho","sn":"Shona","sd":"Sindhi","si":"Sinhala","sk":"Slovak","sl":"Slovenian","so":"Somali","es":"Spanish","su":"Sundanese","sw":"Swahili","sv":"Swedish","tg":"Tajik","ta":"Tamil","te":"Telugu","th":"Thai","tr":"Turkish","uk":"Ukrainian","ur":"Urdu","uz":"Uzbek","vi":"Vietnamese","cy":"Welsh","xh":"Xhosa","yi":"Yiddish","yo":"Yoruba","zu":"Zulu"};

    const src = document.getElementById('srcLang');
    const target = document.getElementById('targetLang');
    const status = document.getElementById('status');
    const micBtn = document.getElementById('micBtn');

    // Load 100+ Bahasa
    Object.entries(langs).forEach(([code, name]) => {
        const opt = `<option value="${code}">${name.toUpperCase()}</option>`;
        src.innerHTML += opt; target.innerHTML += opt;
    });
    target.value = "en"; // Default target English

    let timer;
    function trigger() {
        status.innerText = 'MEMPROSES...';
        clearTimeout(timer);
        timer = setTimeout(translate, 800);
    }

    async function translate() {
        const text = document.getElementById('inputText').value;
        const out = document.getElementById('outputText');
        if(!text) { out.innerText = '...'; status.innerText = 'READY'; return; }

        try {
            const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${src.value}&tl=${target.value}&dt=t&q=${encodeURIComponent(text)}`;
            const res = await fetch(url);
            const data = await res.json();
            if(data && data[0]) {
                out.innerText = data[0].map(x => x[0]).join("");
                status.innerText = 'COMPLETED';
            }
        } catch (e) { status.innerText = 'SYNC ERROR'; }
    }

    // FITUR PREMIUM: VOICE RECOGNITION (MIC)
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SpeechRecognition) {
        const recognition = new SpeechRecognition();
        recognition.onstart = () => { micBtn.classList.add('active'); status.innerText = 'LISTENING...'; };
        recognition.onend = () => { micBtn.classList.remove('active'); status.innerText = 'PROCESSING VOICE...'; };
        recognition.onresult = (event) => {
            document.getElementById('inputText').value = event.results[0][0].transcript;
            translate();
        };
        window.toggleMic = () => recognition.start();
    } else {
        micBtn.style.display = 'none';
    }

    // FITUR PREMIUM: TEXT TO SPEECH (LISTEN)
    window.speakResult = () => {
        const text = document.getElementById('outputText').innerText;
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = target.value;
        window.speechSynthesis.speak(utterance);
    };

    window.copyResult = () => {
        navigator.clipboard.writeText(document.getElementById('outputText').innerText);
        status.innerText = 'COPIED!';
        setTimeout(() => status.innerText = 'READY', 2000);
    };

    window.clearText = () => {
        document.getElementById('inputText').value = '';
        document.getElementById('outputText').innerText = '...';
        status.innerText = 'CLEARED';
    };

    window.swap = () => {
        if(src.value === 'auto') return;
        const t = src.value; src.value = target.value; target.value = t;
        translate();
    };
</script>
</body>
</html>
