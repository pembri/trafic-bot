<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Translator Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #09090b; --card: #1c1c1e; --accent: #3b82f6; --border: #2c2c2e; --text: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 10px; box-sizing: border-box; }
        .app-container { background: var(--card); width: 100%; max-width: 500px; border-radius: 28px; border: 1px solid var(--border); box-shadow: 0 25px 50px rgba(0,0,0,0.6); overflow: hidden; }
        .header { padding: 20px; text-align: center; border-bottom: 1px solid var(--border); background: rgba(255,255,255,0.02); }
        .header h1 { font-size: 1.2rem; margin: 0; color: #fff; letter-spacing: 2px; text-transform: uppercase; }
        .lang-selector { display: flex; align-items: center; justify-content: space-between; padding: 15px 20px; background: #121214; }
        select { background: transparent; color: #fff; border: none; font-size: 0.85rem; font-weight: 600; cursor: pointer; outline: none; width: 42%; }
        .swap-btn { width: 35px; height: 35px; border-radius: 50%; border: 1px solid var(--border); display: flex; justify-content: center; align-items: center; cursor: pointer; color: var(--accent); transition: 0.3s; }
        .box { padding: 20px; border-bottom: 1px solid var(--border); }
        textarea { width: 100%; background: transparent; border: none; color: #fff; font-size: 1.1rem; resize: none; outline: none; min-height: 110px; padding: 0; line-height: 1.5; }
        .result-box { background: #121214; padding: 20px; min-height: 110px; position: relative; }
        .result-text { font-size: 1.1rem; color: #4ade80; white-space: pre-wrap; }
        .status { position: absolute; bottom: 8px; right: 20px; font-size: 0.6rem; color: #555; text-transform: uppercase; }
        .actions { display: flex; gap: 15px; margin-top: 10px; }
        .icon-btn { cursor: pointer; color: #71717a; font-size: 0.8rem; transition: 0.2s; }
        .icon-btn:hover { color: var(--accent); }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header"><h1>TRANSLATOR</h1></div>
    <div class="lang-selector">
        <select id="srcLang"><option value="auto">Deteksi Otomatis</option></select>
        <div class="swap-btn" onclick="swap()"><i class="fas fa-exchange-alt"></i></div>
        <select id="targetLang"></select>
    </div>
    <div class="box">
        <textarea id="inputText" placeholder="Ketik di sini..." oninput="autoTranslate()"></textarea>
        <div class="actions"><span class="icon-btn" onclick="clearAll()"><i class="fas fa-trash"></i> HAPUS</span></div>
    </div>
    <div class="result-box">
        <div id="outputText" class="result-text">Hasil terjemahan...</div>
        <div id="status" class="status">IDLE</div>
        <div class="actions"><span class="icon-btn" onclick="copy()"><i class="far fa-copy"></i> SALIN HASIL</span></div>
    </div>
</div>

<script>
    const allLangs = {
        "af":"Afrikaans","sq":"Albanian","am":"Amharic","ar":"Arabic","hy":"Armenian","az":"Azerbaijani","eu":"Basque","be":"Belarusian","bn":"Bengali","bs":"Bosnian","bg":"Bulgarian","ca":"Catalan","ceb":"Cebuano","ny":"Chichewa","zh-CN":"Chinese","co":"Corsican","hr":"Croatian","cs":"Czech","da":"Danish","nl":"Dutch","en":"English","eo":"Esperanto","et":"Estonian","tl":"Filipino","fi":"Finnish","fr":"French","fy":"Frisian","gl":"Galician","ka":"Georgian","de":"German","el":"Greek","gu":"Gujarati","ht":"Haitian Creole","ha":"Hausa","haw":"Hawaiian","iw":"Hebrew","hi":"Hindi","hmn":"Hmong","hu":"Hungarian","is":"Icelandic","ig":"Igbo","id":"Indonesian","ga":"Irish","it":"Italian","ja":"Japanese","jv":"Javanese","kn":"Kannada","kk":"Kazakh","km":"Khmer","ko":"Korean","ku":"Kurdish","ky":"Kyrgyz","lo":"Lao","la":"Latin","lv":"Latvian","lt":"Lithuanian","lb":"Luxembourgish","mk":"Macedonian","mg":"Malagasy","ms":"Malay","ml":"Malayalam","mt":"Maltese","mi":"Maori","mr":"Marathi","mn":"Mongolian","my":"Myanmar","ne":"Nepali","no":"Norwegian","ps":"Pashto","fa":"Persian","pl":"Polish","pt":"Portuguese","pa":"Punjabi","ro":"Romanian","ru":"Russian","sm":"Samoan","gd":"Scots Gaelic","sr":"Serbian","st":"Sesotho","sn":"Shona","sd":"Sindhi","si":"Sinhala","sk":"Slovak","sl":"Slovenian","so":"Somali","es":"Spanish","su":"Sundanese","sw":"Swahili","sv":"Swedish","tg":"Tajik","ta":"Tamil","te":"Telugu","th":"Thai","tr":"Turkish","uk":"Ukrainian","ur":"Urdu","uz":"Uzbek","vi":"Vietnamese","cy":"Welsh","xh":"Xhosa","yi":"Yiddish","yo":"Yoruba","zu":"Zulu"
    };

    const src = document.getElementById('srcLang');
    const target = document.getElementById('targetLang');
    
    // Isi dropdown dengan 100 bahasa
    Object.entries(allLangs).forEach(([code, name]) => {
        src.innerHTML += `<option value="${code}">${name}</option>`;
        target.innerHTML += `<option value="${code}">${name}</option>`;
    });
    src.value = "auto"; target.value = "en";

    let timer;
    function autoTranslate() {
        document.getElementById('status').innerText = 'Ngetik...';
        clearTimeout(timer);
        timer = setTimeout(execute, 500);
    }

    async function execute() {
        const text = document.getElementById('inputText').value;
        const out = document.getElementById('outputText');
        const st = document.getElementById('status');
        if(!text) { out.innerText = 'Hasil terjemahan...'; st.innerText = 'IDLE'; return; }
        
        st.innerText = 'Menerjemahkan...';
        try {
            const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${src.value}&tl=${target.value}&dt=t&q=${encodeURIComponent(text)}`;
            const res = await fetch(url);
            const data = await res.json();
            let resText = "";
            data[0].forEach(row => { if(row[0]) resText += row[0]; });
            out.innerText = resText;
            st.innerText = 'Selesai';
        } catch (e) { st.innerText = 'Error!'; }
    }

    function swap() { const t = src.value; src.value = target.value; target.value = t; execute(); }
    function clearAll() { document.getElementById('inputText').value = ''; execute(); }
    function copy() { navigator.clipboard.writeText(document.getElementById('outputText').innerText); alert("Tersalin!"); }
</script>
</body>
</html>
