<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Translator Elite</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Desain Kreatif: Latar Belakang Gradasi Dinamis */
        body {
            margin: 0;
            padding: 20px;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #312e81 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            color: #fff;
        }

        /* Elemen Dekoratif agar tidak terasa kosong */
        body::before {
            content: "";
            position: absolute;
            width: 300px; height: 300px;
            background: rgba(59, 130, 246, 0.2);
            filter: blur(80px);
            border-radius: 50%;
            top: 10%; left: -50px;
            z-index: -1;
        }

        /* Container Glassmorphism */
        .app-container {
            width: 100%;
            max-width: 480px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 35px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .header {
            padding: 30px 20px 15px;
            text-align: center;
        }

        .header h1 {
            font-size: 1.5rem;
            margin: 0;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
            letter-spacing: 3px;
        }

        /* Lang Selector UI Baru */
        .lang-selector {
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 20px;
            background: rgba(0, 0, 0, 0.2);
            margin: 0 20px;
            border-radius: 20px;
        }

        select {
            background: none;
            color: #cbd5e1;
            border: none;
            font-size: 0.9rem;
            font-weight: 500;
            outline: none;
            cursor: pointer;
            width: 40%;
            text-align: center;
        }

        .swap-btn {
            width: 45px; height: 45px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: 0.4s;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }

        .swap-btn:hover { transform: rotate(180deg) scale(1.1); }

        /* Input & Result Styling */
        .box { padding: 25px 25px 10px; }
        
        textarea {
            width: 100%;
            background: transparent;
            border: none;
            color: #fff;
            font-size: 1.15rem;
            resize: none;
            outline: none;
            min-height: 120px;
            padding: 0;
            line-height: 1.6;
        }

        textarea::placeholder { color: rgba(255,255,255,0.3); }

        .result-box {
            padding: 25px;
            background: rgba(255, 255, 255, 0.03);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            min-height: 120px;
            position: relative;
        }

        .result-text {
            font-size: 1.15rem;
            color: #4ade80;
            font-weight: 500;
            line-height: 1.6;
        }

        /* Action Buttons & Status */
        .actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
        }

        .icon-group { display: flex; gap: 15px; }

        .icon-btn {
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 0.75rem;
            color: #94a3b8;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .icon-btn:hover { background: rgba(255, 255, 255, 0.2); color: #fff; }

        #status {
            font-size: 0.65rem;
            color: #64748b;
            font-weight: 700;
            letter-spacing: 1px;
        }

    </style>
</head>
<body>

<div class="app-container">
    <div class="header"><h1>TRANSLATOR</h1></div>

    <div class="lang-selector">
        <select id="srcLang"><option value="auto">AUTO DETECT</option></select>
        <div class="swap-btn" onclick="swap()"><i class="fas fa-random" style="font-size: 0.9rem;"></i></div>
        <select id="targetLang"></select>
    </div>

    <div class="box">
        <textarea id="inputText" placeholder="Enter text to translate..." oninput="autoTranslate()"></textarea>
        <div class="actions">
            <span class="icon-btn" onclick="clearAll()"><i class="fas fa-eraser"></i> CLEAR</span>
            <div id="status">READY</div>
        </div>
    </div>

    <div class="result-box">
        <div id="outputText" class="result-text">Translation results...</div>
        <div class="actions">
            <span class="icon-btn" onclick="copy()"><i class="far fa-clone"></i> COPY RESULT</span>
        </div>
    </div>
</div>

<script>
    // KODE INTI TETAP SAMA (DIPERTAHANKAN)
    const allLangs = {"af":"Afrikaans","sq":"Albanian","am":"Amharic","ar":"Arabic","hy":"Armenian","az":"Azerbaijani","eu":"Basque","be":"Belarusian","bn":"Bengali","bs":"Bosnian","bg":"Bulgarian","ca":"Catalan","ceb":"Cebuano","ny":"Chichewa","zh-CN":"Chinese","co":"Corsican","hr":"Croatian","cs":"Czech","da":"Danish","nl":"Dutch","en":"English","eo":"Esperanto","et":"Estonian","tl":"Filipino","fi":"Finnish","fr":"French","fy":"Frisian","gl":"Galician","ka":"Georgian","de":"German","el":"Greek","gu":"Gujarati","ht":"Haitian Creole","ha":"Hausa","haw":"Hawaiian","iw":"Hebrew","hi":"Hindi","hmn":"Hmong","hu":"Hungarian","is":"Icelandic","ig":"Igbo","id":"Indonesian","ga":"Irish","it":"Italian","ja":"Japanese","jv":"Javanese","kn":"Kannada","kk":"Kazakh","km":"Khmer","ko":"Korean","ku":"Kurdish","ky":"Kyrgyz","lo":"Lao","la":"Latin","lv":"Latvian","lt":"Lithuanian","lb":"Luxembourgish","mk":"Macedonian","mg":"Malagasy","ms":"Malay","ml":"Malayalam","mt":"Maltese","mi":"Maori","mr":"Marathi","mn":"Mongolian","my":"Myanmar","ne":"Nepali","no":"Norwegian","ps":"Pashto","fa":"Persian","pl":"Polish","pt":"Portuguese","pa":"Punjabi","ro":"Romanian","ru":"Russian","sm":"Samoan","gd":"Scots Gaelic","sr":"Serbian","st":"Sesotho","sn":"Shona","sd":"Sindhi","si":"Sinhala","sk":"Slovak","sl":"Slovenian","so":"Somali","es":"Spanish","su":"Sundanese","sw":"Swahili","sv":"Swedish","tg":"Tajik","ta":"Tamil","te":"Telugu","th":"Thai","tr":"Turkish","uk":"Ukrainian","ur":"Urdu","uz":"Uzbek","vi":"Vietnam","cy":"Welsh","xh":"Xhosa","yi":"Yiddish","yo":"Yoruba","zu":"Zulu"};

    const src = document.getElementById('srcLang');
    const target = document.getElementById('targetLang');
    
    Object.entries(allLangs).forEach(([code, name]) => {
        src.innerHTML += `<option value="${code}">${name.toUpperCase()}</option>`;
        target.innerHTML += `<option value="${code}">${name.toUpperCase()}</option>`;
    });
    src.value = "auto"; target.value = "id";

    let timer;
    function autoTranslate() {
        document.getElementById('status').innerText = 'TYPING...';
        clearTimeout(timer);
        timer = setTimeout(execute, 500);
    }

    async function execute() {
        const text = document.getElementById('inputText').value;
        const out = document.getElementById('outputText');
        const st = document.getElementById('status');
        if(!text) { out.innerText = 'Translation results...'; st.innerText = 'READY'; return; }
        
        st.innerText = 'TRANSLATING...';
        try {
            const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${src.value}&tl=${target.value}&dt=t&q=${encodeURIComponent(text)}`;
            const res = await fetch(url);
            const data = await res.json();
            let resText = "";
            data[0].forEach(row => { if(row[0]) resText += row[0]; });
            out.innerText = resText;
            st.innerText = 'COMPLETED';
        } catch (e) { st.innerText = 'ERROR'; }
    }

    function swap() { const t = src.value; src.value = target.value; target.value = t; execute(); }
    function clearAll() { document.getElementById('inputText').value = ''; execute(); }
    function copy() { 
        navigator.clipboard.writeText(document.getElementById('outputText').innerText);
        const btn = event.currentTarget;
        btn.innerHTML = '<i class="fas fa-check"></i> COPIED!';
        setTimeout(() => btn.innerHTML = '<i class="far fa-clone"></i> COPY RESULT', 2000);
    }
</script>
</body>
</html>
