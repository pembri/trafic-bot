<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traffic Bot + Analysis</title>
    <style>
        :root {
            --bg: #0d1117;
            --panel: #161b22;
            --accent: #5de4c7;
            --text: #c9d1d9;
            --border: #30363d;
            --danger: #da3633;
            --success: #238636;
            --warning: #f1e05a;
        }

        body {
            font-family: 'Courier New', monospace;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .terminal-container {
            background: var(--panel);
            width: 100%;
            max-width: 400px;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            box-sizing: border-box;
        }

        h1 { font-size: 1.1rem; color: var(--accent); text-align: center; margin: 0 0 15px 0; letter-spacing: 1px; }

        label { display: block; font-size: 0.65rem; color: #8b949e; margin-bottom: 5px; text-transform: uppercase; }

        input {
            width: 100%;
            background: #000;
            border: 1px solid var(--border);
            color: var(--accent);
            padding: 10px;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 0.9rem;
            margin-bottom: 12px;
        }

        .row { display: flex; gap: 8px; }
        .col { flex: 1; }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.8rem;
            border-radius: 6px;
            transition: 0.3s;
        }

        .start { background: var(--success); color: #fff; }
        .stop { background: var(--danger); color: #fff; }

        /* ANALISIS PANEL */
        #analysisPanel {
            display: none;
            margin-top: 15px;
            padding: 12px;
            background: #000;
            border: 1px solid var(--border);
            border-radius: 6px;
        }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px;}
        .stat-item { text-align: center; border: 1px solid #222; padding: 8px; border-radius: 4px; }
        .stat-val { font-size: 1.2rem; font-weight: bold; display: block; }

        /* NETWORK MONITOR */
        .monitor-header { font-size: 0.65rem; color: var(--accent); margin-bottom: 5px; display: flex; justify-content: space-between; }
        .progress-bar { height: 4px; background: #222; border-radius: 2px; overflow: hidden; margin-bottom: 10px; }
        .progress-fill { height: 100%; width: 0%; background: var(--accent); transition: 0.3s; }

        .log-box {
            background: #050505;
            height: 100px;
            border-radius: 4px;
            padding: 8px;
            font-size: 0.6rem;
            color: #4ade80;
            overflow-y: auto;
            border: 1px solid #222;
        }
    </style>
</head>
<body>

<div class="terminal-container">
    <h1>[ TRAFFIC BOT + ANALYSIS ]</h1>

    <div class="input-group">
        <label>Target Node URL</label>
        <input type="text" id="targetUrl" placeholder="https://target-website.com">
    </div>
    
    <div class="row">
        <div class="col">
            <label>Interval (s)</label>
            <input type="number" id="intervalTime" value="3">
        </div>
        <div class="col">
            <label>Threads</label>
            <input type="number" id="threads" value="1">
        </div>
    </div>

    <button class="btn start" id="mainBtn" onclick="toggleBot()">Execute Engine</button>

    <div id="analysisPanel">
        <div class="monitor-header">
            <span>NETWORK DATA TRANSFER</span>
            <span id="loadPercent">0%</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="bar"></div></div>

        <div class="stats-grid">
            <div class="stat-item">
                <label>HITS</label>
                <span class="stat-val" id="countDisplay">0</span>
            </div>
            <div class="stat-item">
                <label>SIGNAL</label>
                <span class="stat-val" id="signalStatus" style="color:var(--warning)">STABLE</span>
            </div>
        </div>

        <div class="log-box" id="logBox">> Analysis tool standby...</div>
    </div>
</div>

<script>
    let isRunning = false;
    let count = 0;
    let botInterval;

    function addLog(msg) {
        const box = document.getElementById('logBox');
        const time = new Date().toLocaleTimeString('id-ID');
        box.innerHTML += `<div>[${time}] ${msg}</div>`;
        box.scrollTop = box.scrollHeight;
    }

    function toggleBot() {
        const btn = document.getElementById('mainBtn');
        const analysis = document.getElementById('analysisPanel');
        const url = document.getElementById('targetUrl').value;
        const interval = document.getElementById('intervalTime').value * 1000;
        const threads = parseInt(document.getElementById('threads').value);
        const signal = document.getElementById('signalStatus');
        const bar = document.getElementById('bar');

        if (!isRunning) {
            if (!url.startsWith('http')) return alert("Gunakan URL Lengkap!");
            
            isRunning = true;
            btn.innerText = "Terminate Engine";
            btn.className = "btn stop";
            analysis.style.display = "block";
            addLog("System inisialisasi...");

            botInterval = setInterval(() => {
                let successHits = 0;
                bar.style.width = "100%";
                document.getElementById('loadPercent').innerText = "100%";

                for (let i = 0; i < threads; i++) {
                    const ifr = document.createElement('iframe');
                    ifr.style.display = 'none';
                    ifr.src = url + "?v=" + Math.random();
                    
                    // Event listener untuk membuktikan adanya respon data
                    ifr.onload = function() {
                        successHits++;
                        addLog(`Node [${i+1}] data received.`);
                    };

                    document.body.appendChild(ifr);
                    setTimeout(() => {
                        ifr.remove();
                        bar.style.width = "0%";
                        document.getElementById('loadPercent').innerText = "0%";
                    }, 2000);
                }

                count += threads;
                document.getElementById('countDisplay').innerText = count;
                signal.innerText = "ACTIVE";
                signal.style.color = "var(--accent)";
                addLog(`Injected ${threads} payload(s) to target.`);
            }, interval);

        } else {
            isRunning = false;
            btn.innerText = "Execute Engine";
            btn.className = "btn start";
            signal.innerText = "OFFLINE";
            signal.style.color = "var(--danger)";
            clearInterval(botInterval);
            addLog("Execution stopped by operator.");
        }
    }
</script>

</body>
</html>
