<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traffic Bot Final</title>
    <style>
        :root {
            --bg: #09090b;
            --card: #18181b;
            --cyan: #22d3ee;
            --red: #f43f5e;
            --green: #10b981;
            --border: #27272a;
        }

        body {
            font-family: 'Segoe UI', monospace;
            background: var(--bg);
            color: #e4e4e7;
            margin: 0; padding: 15px;
            display: flex; justify-content: center;
        }

        .container {
            background: var(--card);
            width: 100%; max-width: 400px;
            padding: 20px; border-radius: 16px;
            border: 1px solid var(--border);
        }

        h1 { font-size: 1.2rem; color: var(--cyan); text-align: center; letter-spacing: 2px; }

        input {
            width: 100%; background: #000; border: 1px solid var(--border);
            color: var(--cyan); padding: 12px; border-radius: 8px;
            margin-bottom: 12px; box-sizing: border-box;
        }

        .row { display: flex; gap: 10px; }
        .col { flex: 1; }
        label { font-size: 0.7rem; color: #71717a; display: block; margin-bottom: 5px; }

        .btn {
            width: 100%; padding: 15px; border: none; border-radius: 8px;
            font-weight: bold; cursor: pointer; margin: 15px 0;
            transition: 0.2s; text-transform: uppercase;
        }
        .start { background: var(--green); color: #000; }
        .stop { background: var(--red); color: #fff; }

        /* LIVE PROOF MONITOR */
        #monitor {
            background: #000; border: 1px solid var(--border);
            padding: 15px; border-radius: 10px; display: none;
        }

        .signal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .box { text-align: center; border: 1px solid #333; padding: 10px; border-radius: 6px; }
        .val { font-size: 1.2rem; font-weight: bold; color: #fff; }

        /* Grafik Visual Network */
        .visual-bars {
            height: 50px; display: flex; align-items: flex-end; gap: 3px;
            border-bottom: 1px solid var(--cyan); margin-bottom: 10px; overflow: hidden;
        }
        .bar { width: 100%; background: var(--cyan); min-height: 2px; transition: 0.1s; }

        .log { height: 80px; font-size: 0.65rem; color: var(--green); overflow-y: auto; font-family: monospace; }
    </style>
</head>
<body>

<div class="container">
    <h1>TRAFFIC BOT</h1>

    <label>TARGET NODE</label>
    <input type="text" id="targetUrl" value="https://sairootsmusic.github.io">

    <div class="row">
        <div class="col">
            <label>INTERVAL (S)</label>
            <input type="number" id="intervalTime" value="3">
        </div>
        <div class="col">
            <label>THREADS</label>
            <input type="number" id="threads" value="1">
        </div>
    </div>

    <button class="btn start" id="mainBtn" onclick="toggleBot()">Execute Engine</button>

    <div id="monitor">
        <div class="visual-bars" id="barContainer"></div>
        
        <div class="signal-grid">
            <div class="box">
                <label>NETWORK HITS</label>
                <span class="val" id="hitCount">0</span>
            </div>
            <div class="box">
                <label>DATA FLOW</label>
                <span class="val" id="flowStatus" style="color:var(--red)">OFFLINE</span>
            </div>
        </div>

        <div class="log" id="logBox">> Ready for data injection...</div>
    </div>
</div>

<script>
    let isRunning = false;
    let count = 0;
    let botInterval;

    // Membuat bar awal untuk grafik
    const container = document.getElementById('barContainer');
    for(let i=0; i<25; i++) {
        let b = document.createElement('div');
        b.className = 'bar';
        b.style.height = '2px';
        container.appendChild(b);
    }

    function updateVisual() {
        const bars = document.querySelectorAll('.bar');
        bars.forEach(b => {
            let h = Math.floor(Math.random() * 45) + 5;
            b.style.height = h + 'px';
            setTimeout(() => b.style.height = '2px', 300);
        });
    }

    function addLog(msg) {
        const box = document.getElementById('logBox');
        box.innerHTML += `<div>> ${msg}</div>`;
        box.scrollTop = box.scrollHeight;
    }

    function toggleBot() {
        const btn = document.getElementById('mainBtn');
        const mon = document.getElementById('monitor');
        const url = document.getElementById('targetUrl').value;
        const interval = document.getElementById('intervalTime').value * 1000;
        const threads = document.getElementById('threads').value;

        if (!isRunning) {
            isRunning = true;
            btn.innerText = "Terminate Engine";
            btn.className = "btn stop";
            mon.style.display = "block";
            document.getElementById('flowStatus').innerText = "ACTIVE";
            document.getElementById('flowStatus').style.color = "var(--cyan)";

            botInterval = setInterval(() => {
                for (let i = 0; i < threads; i++) {
                    const ifr = document.createElement('iframe');
                    ifr.style.display = 'none';
                    ifr.src = url + "?t=" + Date.now();
                    
                    // BUKTI FISIK: Onload hanya terpanggil jika server merespon
                    ifr.onload = function() {
                        updateVisual();
                        addLog(`SUCCESS: Data packet received from ${url.split('/')[2]}`);
                    };

                    document.body.appendChild(ifr);
                    setTimeout(() => ifr.remove(), 2500);
                }
                count += parseInt(threads);
                document.getElementById('hitCount').innerText = count;
            }, interval);
        } else {
            isRunning = false;
            btn.innerText = "Execute Engine";
            btn.className = "btn start";
            document.getElementById('flowStatus').innerText = "OFFLINE";
            document.getElementById('flowStatus').style.color = "var(--red)";
            clearInterval(botInterval);
        }
    }
</script>

</body>
</html>
